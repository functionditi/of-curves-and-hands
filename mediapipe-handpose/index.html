<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client - MediaPipe HandPose Guided Kolam</title>

  <style>
    @font-face {
      font-family: "PP Mori";
      src: url("./assets/fonts/PPMori/PPMori-Regular.otf") format("opentype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "PP Mori";
      src: url("./assets/fonts/PPMori/PPMori-RegularItalic.otf") format("opentype");
      font-weight: 400;
      font-style: italic;
      font-display: swap;
    }

    @font-face {
      font-family: "PP Mori";
      src: url("./assets/fonts/PPMori/PPMori-Semibold.otf") format("opentype");
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "PP Mori";
      src: url("./assets/fonts/PPMori/PPMori-Black.otf") format("opentype");
      font-weight: 800;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --font-ui: "PP Mori", "Avenir Next", "Segoe UI", sans-serif;
      --page-bg: #0255ff;
      --panel-border: #d8def0;
      --panel-surface: rgba(63, 89, 224, 0.9);
      --panel-text: #f5f7ff;
      --panel-muted: rgba(216, 222, 240, 0.82);
      --frame-node-size: 12px;
      --frame-line-y: 52px;
      --frame-line: rgba(216, 222, 240, 0.72);
      --edge-glow: rgba(168, 215, 255, 0.3);
      --plotter-fill: #d8def0;
      --plotter-line: #4a67e2;
      --plotter-text: #2843ba;
      --plotter-node-size: 12px;
      --plotter-rail-y: 42px;
      --plotter-column-bg: #ffffff;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: var(--page-bg);
      overflow: hidden;
    }

    body {
      font-family: var(--font-ui);
      position: relative;
      isolation: isolate;
      padding: 18px;
      background:
        radial-gradient(circle at 0% 50%, rgba(208, 232, 255, 0.42) 0, rgba(208, 232, 255, 0.2) 5%, rgba(208, 232, 255, 0) 18%),
        radial-gradient(circle at 100% 50%, rgba(208, 232, 255, 0.42) 0, rgba(208, 232, 255, 0.2) 5%, rgba(208, 232, 255, 0) 18%),
        linear-gradient(180deg, #0a5dff 0%, #1657f0 38%, #2f55d3 100%);
    }

    #app-shell {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 20% minmax(0, 1fr);
      gap: 18px;
    }

    #info-panel,
    #stage-panel {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: visible;
      border: 1px solid var(--panel-border);
      border-radius: 0;
      background:
        linear-gradient(180deg, rgba(82, 109, 235, 0.9) 0%, rgba(58, 84, 214, 0.96) 100%);
      color: var(--panel-text);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.08),
        0 0 34px var(--edge-glow);
    }

    #info-panel::before,
    #stage-panel::before {
      content: "";
      position: absolute;
      top: calc(var(--frame-line-y) - (var(--frame-node-size) / 2));
      width: var(--frame-node-size);
      height: var(--frame-node-size);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.98);
      box-shadow:
        0 calc(100% - (var(--frame-line-y) + var(--frame-line-y))) 0 0 rgba(255, 255, 255, 0.98),
        0 0 12px rgba(255, 255, 255, 0.22);
      pointer-events: none;
      z-index: 2;
    }

    #info-panel::after,
    #stage-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(var(--frame-line), var(--frame-line)),
        linear-gradient(var(--frame-line), var(--frame-line));
      background-repeat: no-repeat;
      background-size: 100% 1px, 100% 1px;
      background-position:
        0 var(--frame-line-y),
        0 calc(100% - var(--frame-line-y));
      pointer-events: none;
      z-index: 1;
    }

    #info-panel::before {
      left: calc(var(--frame-node-size) / -2);
    }

    #stage-panel::before {
      right: calc(var(--frame-node-size) / -2);
    }

    #info-panel>*,
    #stage-panel>* {
      position: relative;
      z-index: 2;
    }

    #info-panel {
      display: flex;
      flex-direction: column;
      padding: 52px 38px;
    }

    #status {
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 0;
      flex: 0 0 auto;
    }

    #status-label {
      margin-top: 12px;
      margin-bottom: 12px;
      color: var(--panel-muted);
      font: 800 15px/1 var(--font-ui);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    #status-text {
      color: var(--panel-text);
      max-width: 18ch;
      font: 600 clamp(18px, 2vw, 32px)/1.26 var(--font-ui);
      letter-spacing: -0.02em;
      opacity: 1;
      transition: opacity 180ms ease-in-out;
      will-change: opacity;
    }

    #status-text.is-fading {
      opacity: 0;
    }

    #stage-panel {
      padding: 28px 24px;
      display: flex;
    }

    #stage-viewport {
      position: relative;
      flex: 1;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      border-radius: 0;
      background: transparent;
      box-shadow: inset 0 0 0 1px rgba(216, 222, 240, 0.04);
    }

    #output {
      display: block;
      width: 100%;
      height: 100%;
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    @media (max-width: 900px) {
      body {
        padding: 12px;
      }

      #app-shell {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, auto) minmax(0, 1fr);
        gap: 12px;
      }

      #info-panel {
        padding: 44px 24px 28px;
      }

      #stage-panel {
        min-height: 52vh;
        padding: 22px;
      }

      #info-panel,
      #stage-panel {
        --frame-line-y: 40px;
      }
    }

    #plotter-lightbox {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(10, 18, 76, 0.22);
      backdrop-filter: blur(8px);
      z-index: 3;
      padding: 24px;
      box-sizing: border-box;
    }

    #plotter-lightbox.visible {
      display: flex;
    }

    #plotter-panel {
      position: relative;
      width: min(88vw, 840px);
      height: min(80vh, 760px);
      max-height: min(80vh, 760px);
      overflow: visible;
      background: var(--plotter-fill);
      border: 1px solid var(--plotter-line);
      border-radius: 0;
      box-sizing: border-box;
      padding: 0;
      box-shadow: 0 28px 56px rgba(10, 30, 110, 0.18);
    }

    #plotter-panel::before {
      content: "";
      position: absolute;
      left: calc(var(--plotter-node-size) / -2);
      top: calc(var(--plotter-rail-y) - (var(--plotter-node-size) / 2));
      width: var(--plotter-node-size);
      height: var(--plotter-node-size);
      border-radius: 50%;
      background: var(--plotter-line);
      box-shadow:
        calc(100% - var(--plotter-node-size)) 0 0 0 var(--plotter-line),
        0 calc(100% - (var(--plotter-rail-y) + var(--plotter-rail-y))) 0 0 var(--plotter-line),
        calc(100% - var(--plotter-node-size)) calc(100% - (var(--plotter-rail-y) + var(--plotter-rail-y))) 0 0 var(--plotter-line);
      pointer-events: none;
      z-index: 2;
    }

    #plotter-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(var(--plotter-line), var(--plotter-line)),
        linear-gradient(var(--plotter-line), var(--plotter-line));
      background-repeat: no-repeat;
      background-size: 100% 1px, 100% 1px;
      background-position:
        0 var(--plotter-rail-y),
        0 calc(100% - var(--plotter-rail-y));
      pointer-events: none;
      z-index: 1;
    }

    #plotter-panel>* {
      position: relative;
      z-index: 2;
    }

    #plotter-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 420px;
      grid-template-rows: 1fr;
      align-items: stretch;
      height: 100%;
    }

    #plotter-main {
      min-width: 0;
      min-height: 0;
      height: 100%;
      box-sizing: border-box;
      padding: 58px 32px 42px 40px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #plotter-side {
      background: var(--plotter-column-bg);
      border-left: 1px solid rgba(74, 103, 226, 0.22);
      min-height: 0;
      height: 100%;
      box-sizing: border-box;
      padding: 58px 36px 42px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    #plotter-side-label {
      color: rgba(40, 67, 186, 0.68);
      font: 800 11px/1 var(--font-ui);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    #plotter-side-title {
      margin: 0;
      color: var(--plotter-text);
      font: 600 28px/1.02 var(--font-ui);
      letter-spacing: -0.02em;
      max-width: 9ch;
    }

    #plotter-side-copy {
      color: rgba(40, 67, 186, 0.78);
      font: 600 14px/1.4 var(--font-ui);
      max-width: 30ch;
    }

    #plotter-mockup-shell {
      flex: 1;
      min-height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(74, 103, 226, 0.16);
      background: rgba(216, 222, 240, 0.34);
      padding: 28px;
    }

    #plotter-mockup-image {
      display: block;
      width: 100%;
      max-width: 360px;
      height: auto;
      object-fit: contain;
      opacity: 0;
      transition: opacity 120ms ease;
    }

    #plotter-mockup-image.visible {
      opacity: 1;
    }

    #plotter-title {
      margin: 0;
      color: var(--plotter-text);
      font: 600 34px/1.02 var(--font-ui);
      letter-spacing: -0.02em;
      text-align: left;
      max-width: 14ch;
    }

    #plotter-message {
      color: rgba(40, 67, 186, 0.86);
      font: 600 17px/1.4 var(--font-ui);
      text-align: left;
      min-height: 1.3em;
      max-width: 34ch;
    }

    #plotter-preview-shell {
      background: rgba(236, 240, 251, 0.66);
      border: 1px solid rgba(74, 103, 226, 0.34);
      border-radius: 0;
      padding: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 320px;
      flex: 1;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.24);
    }

    #plotter-preview {
      display: block;
      max-width: 100%;
      max-height: min(46vh, 460px);
      object-fit: contain;
    }

    #plotter-footer {
      color: var(--plotter-text);
      font: 600 16px/1.3 var(--font-ui);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-align: left;
      min-height: 1.2em;
    }

    @media (max-width: 760px) {
      #plotter-panel {
        width: min(92vw, 840px);
        height: auto;
      }

      #plotter-layout {
        grid-template-columns: 1fr;
        grid-template-rows: none;
        height: auto;
      }

      #plotter-main {
        padding: 50px 24px 24px;
      }

      #plotter-side {
        border-left: 0;
        border-top: 1px solid rgba(74, 103, 226, 0.22);
        padding: 20px 24px 28px;
      }

      #plotter-mockup-shell {
        min-height: 240px;
      }
    }
  </style>
</head>

<body>
  <main id="app-shell">
    <aside id="info-panel">
      <div id="status" aria-live="polite">
        <div id="status-label">Live Status</div>
        <div id="status-text">Starting camera...</div>
      </div>
    </aside>
    <section id="stage-panel" aria-label="Kolam and hand tracking view">
      <div id="stage-viewport">
        <canvas id="output"></canvas>
      </div>
    </section>
  </main>
  <div id="plotter-lightbox">
    <div id="plotter-panel">
      <div id="plotter-layout">
        <div id="plotter-main">
          <h2 id="plotter-title">Sending Kolam...</h2>
          <div id="plotter-message"></div>
          <div id="plotter-preview-shell">
            <img id="plotter-preview" alt="Final kolam preview" />
          </div>
          <div id="plotter-footer"></div>
        </div>
        <aside id="plotter-side" aria-label="Plotter status">
          <div id="plotter-side-label">Your Kolam</div>
          <h3 id="plotter-side-title">Waiting for plotter</h3>
          <div id="plotter-side-copy">The plotter that will draw your kolam will appear here.</div>
          <div id="plotter-mockup-shell" aria-live="polite">
            <img id="plotter-mockup-image" alt="" hidden />
          </div>
        </aside>
      </div>
    </div>
  </div>

  <script type="module">
    const PAGE_BG = "#0255ff";
    const PLOTTER_MOCKUP_URL_BY_LABEL = Object.freeze({

    const FALLBACK_ACTIVE_PLOTTERS = [
      { plotter_index: 1, plotter_label: "A" },

    ];
    const FALLBACK_DEDICATED_PASSIVE_PLOTTER_INDEX = 3;
    const GAMEPAD_PLOTTER_BUTTON_PRIORITY = [2, 1, 3, 0];
    const PLOTTER_STATE_FETCH_COOLDOWN_MS = 2000;
    const PLOTTER_STATE_REFRESH_INTERVAL_MS = 8000;
    const DEDICATED_PASSIVE_ENSURE_COOLDOWN_MS = 10000;
    const TASKS_VISION_VERSION = "0.10.22-rc.20250304";
    const VISION_BUNDLE_URL = `https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@${TASKS_VISION_VERSION}/vision_bundle.mjs`;
    const WASM_ROOT = `https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@${TASKS_VISION_VERSION}/wasm`;
    const HAND_MODEL_URL =
      "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task";

    const HAND_CONNECTIONS = [
      [0, 1], [1, 2], [2, 3], [3, 4],

      [9, 13], [13, 14], [14, 15], [15, 16],

    const GRID_SIZE_MAX = 4;

    const GRID_SAFE_PADDING_PX = 40;

    const PINCH_START_RATIO = 0.45;
    const PINCH_END_RATIO = 0.62;
    const PINCH_SMOOTHING = 0.38;

    const DOT_LOCK_RATIO = 0.42;
    const START_DOT_LOCK_RATIO = 0.78;
    const NEXT_DOT_LOCK_RATIO = 0.92;

    const EDGE_REPEAT_COOLDOWN_MS = 240;

    const BRANCH_JOIN_TENSION_RATIO = 0.08;
    const BRANCH_JOIN_SAMPLES = 6;
    const PLOTTER_EXPORT_SIZE_IN = 4;
    const PLOTTER_TRIGGER_COOLDOWN_MS = 1200;
    const LIGHTBOX_DURATION_MS = 7000;
    const STATUS_TEXT_FADE_MS = 180;
    const STATUS_TEXT_MIN_VISIBLE_MS = 900;
    const DEFAULT_PLOTTER_BRIDGE_BASE_URL = "http://localhost:8765";
    const IDLE_TIMEOUT_MS = 3 * 60 * 1000;
    const PASSIVE_MODE_STATUS = "Passive mode is running. Show a hand or press any key to return to active mode.";
    const NEXT_DOT_COLOR = "#ffff00";
    const ERASE_TRACE_ARMED_STATUS = "Erase sweep mode armed. Press P to sweep the packed 3x2 area in erase mode.";
    const GAMEPAD_BUTTON_LABELS = new Map([
      [0, "A"],
      [1, "B"],
      [2, "X"],
      [3, "Y"],
      [8, "Back"],
      [9, "Start"],

      [13, "D-pad down"],
    ]);

    const GAMEPAD_PEN_UP_BUTTON_INDEX = 12;

    const GAMEPAD_WATCHED_BUTTON_INDICES = [

    ];

    const READY_STATUS = "Raise one hand to the camera! Pinch thumb + index near an unvisited pulli (dot) to start the kolam pattern.";
    const NEXT_BRANCH_STATUS = "Release to end branch or find an unvisited dot. Make a fist anytime to draw your kolam.";
    const ACTIVE_BRANCH_STATUS = "Keep pinching and move to neighboring pullis (dot) to build the skeleton. Release to end branch or find an unvisited dot. Make a fist anytime to draw your kolam.";
    const ALL_VISITED_STATUS = "All pullis (dot) have been visited. Form a fist to draw your kolam.";
    const BLOCKED_BRANCH_STATUS = "That branch is blocked. Move to an unvisited dot to start a new branch, or make a fist anytime to draw your kolam.";
    const CAMERA_ROTATION_DEGREES = 0;

    const canvas = document.getElementById("output");
    const stageViewportEl = document.getElementById("stage-viewport");
    const statusTextEl = document.getElementById("status-text");
    const lightboxEl = document.getElementById("plotter-lightbox");
    const lightboxTitleEl = document.getElementById("plotter-title");
    const lightboxMessageEl = document.getElementById("plotter-message");
    const lightboxPreviewEl = document.getElementById("plotter-preview");
    const lightboxFooterEl = document.getElementById("plotter-footer");
    const plotterSideTitleEl = document.getElementById("plotter-side-title");
    const plotterSideCopyEl = document.getElementById("plotter-side-copy");
    const plotterMockupImageEl = document.getElementById("plotter-mockup-image");

    const video = document.createElement("video");
    video.autoplay = true;
    video.muted = true;
    video.playsInline = true;
    const inferenceCanvas = document.createElement("canvas");
    const inferenceCtx = inferenceCanvas.getContext("2d");

    let handLandmarker = null;
    let results = null;
    let lastVideoTime = -1;
    let cssWidth = stageViewportEl.clientWidth || window.innerWidth;
    let cssHeight = stageViewportEl.clientHeight || window.innerHeight;
    let dpr = window.devicePixelRatio || 1;
    let statusText = "";
    let displayedStatusText = "";
    let statusFadeTimeoutId = 0;
    let statusPendingTimeoutId = 0;
    let statusLastCommitAtMs = 0;

    let isPinching = false;
    let isDrawingKolam = false;
    let fistLatched = false;
    let fistStartedAtMs = 0;
    let lastPlotTriggerAtMs = -Infinity;
    let nextPlotRequestId = 0;
    let currentPlotRequestId = 0;
    let currentPlotClientRequestId = null;
    let lightboxVisible = false;
    let lightboxEndsAtMs = 0;
    let lightboxRequestPending = false;
    let lightboxMessage = "";
    let lightboxAfterStatus = "";

    let lightboxPlotterFallbackCopy = "All plotters are busy right now!";

    let lightboxPlotterPollToken = 0;

    let passiveModeState = "active";
    let passiveModeRequestId = 0;
    let lastUserActivityAtMs = performance.now();

    let activeGamepadIndex = null;
    let activeGamepadPlotterIndex = null;
    let currentGridSize = GRID_SIZE_MIN;
    let smoothedPoint = null;
    let pinchPoint = null;
    let hoverDotIndex = -1;

    let activeDotIndex = null;
    let activeBranchId = null;
    let activeLastVector = null;
    let activeBranchPath = [];
    let activeBranchEdgeCount = 0;
    let lastEdgeAtMs = 0;
    let lastEdgePairKey = "";
    let nextBranchId = 1;

    const framework = [];
    const capArcs = [];
    const visitedDots = new Set();
    const visitedDotTimesMs = new Map();
    const gamepadPressedStateByIndex = new Map();
    const PLOTTER_BRIDGE_BASE_URL = resolvePlotterBridgeBaseUrl();
    let availablePlotters = [];
    let availablePlotterLabels = [];
    let gamepadPlotterByButtonIndex = new Map();
    let lastPlotterStateFetchAtMs = -Infinity;
    let lastDedicatedPassiveEnsureAtMs = -Infinity;
    let dedicatedPassiveEnsurePromise = null;
    let dedicatedPassivePlotterIndex = FALLBACK_DEDICATED_PASSIVE_PLOTTER_INDEX;
    let dedicatedPassivePlotterPort = null;

    function resolvePlotterBridgeBaseUrl() {
      const params = new URLSearchParams(window.location.search);
      const requestedBaseUrl = params.get("bridgeBase");
      if (requestedBaseUrl) {
        try {
          return normalizeBridgeBaseUrl(requestedBaseUrl);
        } catch (error) {
          console.warn("Ignoring invalid bridgeBase query parameter.", error);
        }
      }

      const requestedOrigin = params.get("bridge");
      if (requestedOrigin) {
        try {
          return normalizeBridgeBaseUrl(new URL(requestedOrigin).origin);
        } catch (error) {
          console.warn("Ignoring invalid bridge query parameter.", error);
        }
      }

      if (window.location.protocol.startsWith("http")) {
        return normalizeBridgeBaseUrl(`${window.location.origin}/`);
      }

      return DEFAULT_PLOTTER_BRIDGE_BASE_URL;
    }

    function normalizeBridgeBaseUrl(value) {
      const url = new URL(value, window.location.href);
      return url.href.replace(/\/+$/, "");
    }

    function bridgeUrl(path) {
      const normalizedPath = String(path || "").replace(/^\/+/, "");
      return new URL(normalizedPath, `${PLOTTER_BRIDGE_BASE_URL}/`).toString();
    }

    function joinHumanList(items) {
      if (items.length === 0) {
        return "";
      }
      if (items.length === 1) {
        return items[0];
      }
      if (items.length === 2) {
        return `${items[0]} or ${items[1]}`;
      }
      return `${items.slice(0, -1).join(", ")}, or ${items[items.length - 1]}`;
    }

    function normalizePlotterLabel(label) {
      if (typeof label !== "string") {
        return null;
      }
      const trimmed = label.trim().toUpperCase();
      return trimmed || null;
    }

    function defaultPlotterLabelForIndex(plotterIndex) {
      if (!Number.isInteger(plotterIndex) || plotterIndex < 1) {
        return `#${plotterIndex}`;
      }
      return String.fromCharCode("A".charCodeAt(0) + plotterIndex - 1);
    }

    function fallbackActivePlotters() {
      return FALLBACK_ACTIVE_PLOTTERS.map((plotter) => ({
        plotter_index: plotter.plotter_index,
        plotter_label: plotter.plotter_label,
      }));
    }

    function visibleBridgePlotters(plotters) {
      if (!Array.isArray(plotters)) {
        return [];
      }

      return plotters
        .filter(
          (plotter) => (
            plotter
            && plotter.detected
            && Number.isInteger(plotter.plotter_index)
            && plotter.active_mode_enabled !== false
          )
        )
        .map((plotter) => ({
          plotter_index: plotter.plotter_index,
          plotter_label: normalizePlotterLabel(plotter.plotter_label)
            || defaultPlotterLabelForIndex(plotter.plotter_index),
        }))
        .sort((a, b) => a.plotter_index - b.plotter_index);
    }

    function syncBridgePlotterModeConfig(data) {
      if (Number.isInteger(data?.dedicated_passive_plotter_index)) {
        dedicatedPassivePlotterIndex = data.dedicated_passive_plotter_index;
      }
      if (typeof data?.dedicated_passive_port === "string" && data.dedicated_passive_port.trim()) {
        dedicatedPassivePlotterPort = data.dedicated_passive_port.trim();
      }
    }

    function dedicatedPassivePlotterFromState(data) {
      if (!Array.isArray(data?.plotters)) {
        return null;
      }

      return data.plotters.find((plotter) => plotter && plotter.passive_mode_reserved)
        || data.plotters.find(
          (plotter) => (
            plotter
            && typeof dedicatedPassivePlotterPort === "string"
            && dedicatedPassivePlotterPort
            && plotter.detected_port === dedicatedPassivePlotterPort
          )
        )
        || data.plotters.find(
          (plotter) => plotter && plotter.plotter_index === dedicatedPassivePlotterIndex
        )
        || null;
    }

    function plotRequestAssignmentFromState(data, clientRequestId) {
      if (!clientRequestId || !Array.isArray(data?.active_guided_plot_requests)) {
        return null;
      }

      const matchingRequest = data.active_guided_plot_requests.find(
        (request) => request && request.client_request_id === clientRequestId
      );
      return normalizePlotterLabel(matchingRequest?.assigned_plotter_label);
    }

    function syncGamepadPlotterBindings() {
      gamepadPlotterByButtonIndex = new Map();
      for (let i = 0; i < availablePlotters.length && i < GAMEPAD_PLOTTER_BUTTON_PRIORITY.length; i += 1) {
        gamepadPlotterByButtonIndex.set(GAMEPAD_PLOTTER_BUTTON_PRIORITY[i], availablePlotters[i].plotter_index);
      }

      if (
        activeGamepadPlotterIndex !== null
        && !availablePlotters.some((plotter) => plotter.plotter_index === activeGamepadPlotterIndex)
      ) {
        activeGamepadPlotterIndex = null;
      }
    }

    function setAvailablePlotters(plotters, { fallbackWhenEmpty = true } = {}) {
      availablePlotters = plotters.length > 0 ? plotters : (fallbackWhenEmpty ? fallbackActivePlotters() : []);
      availablePlotterLabels = availablePlotters.map((plotter) => plotter.plotter_label);
      syncGamepadPlotterBindings();
      setLightboxAssignedPlotter(lightboxAssignedPlotterLabel);
    }

    function gamepadPlotterPrompt() {
      const buttonLabels = Array.from(gamepadPlotterByButtonIndex.keys()).map((buttonIndex) => gamepadButtonLabel(buttonIndex));
      if (buttonLabels.length === 0) {
        return "No active plotters are available right now.";
      }
      return `Pick a plotter first with ${joinHumanList(buttonLabels)}.`;
    }

    function gamepadConnectedStatus() {
      const buttonLabels = Array.from(gamepadPlotterByButtonIndex.keys()).map((buttonIndex) => gamepadButtonLabel(buttonIndex));
      if (buttonLabels.length === 0) {
        return "Controller connected, but no active plotters are available.";
      }
      return `Controller connected. Press ${joinHumanList(buttonLabels)} to choose a plotter.`;
    }

    async function ensureDedicatedPassivePlotter(data = null) {
      const nowMs = performance.now();
      if (dedicatedPassiveEnsurePromise) {
        return dedicatedPassiveEnsurePromise;
      }
      if (nowMs - lastDedicatedPassiveEnsureAtMs < DEDICATED_PASSIVE_ENSURE_COOLDOWN_MS) {
        return null;
      }

      syncBridgePlotterModeConfig(data);
      const passivePlotter = dedicatedPassivePlotterFromState(data);
      if (
        !passivePlotter
        || !passivePlotter.detected
        || passivePlotter.passive?.running
        || passivePlotter.busy
      ) {
        return null;
      }

      lastDedicatedPassiveEnsureAtMs = nowMs;
      const passivePort = passivePlotter.detected_port || passivePlotter.port || dedicatedPassivePlotterPort;
      dedicatedPassiveEnsurePromise = postBridgeJson("/passive-mode/start", {
        plotter_index: dedicatedPassivePlotterIndex,
        ports: passivePort ? [passivePort] : [],
      })
        .catch((error) => {
          console.debug("Could not keep the dedicated passive plotter running.", error);
        })
        .finally(() => {
          dedicatedPassiveEnsurePromise = null;
        });
      return dedicatedPassiveEnsurePromise;
    }

    async function refreshAvailablePlotters(force = false) {
      const nowMs = performance.now();
      if (!force && nowMs - lastPlotterStateFetchAtMs < PLOTTER_STATE_FETCH_COOLDOWN_MS) {
        return;
      }

      lastPlotterStateFetchAtMs = nowMs;
      try {
        const response = await fetch(bridgeUrl("/dashboard/state"));
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          return;
        }

        const bridgePlotters = visibleBridgePlotters(data?.plotters);
        setAvailablePlotters(bridgePlotters, { fallbackWhenEmpty: false });
        void ensureDedicatedPassivePlotter(data);
      } catch (error) {
        console.debug("Could not refresh active plotter state.", error);
      }
    }

    setAvailablePlotters(fallbackActivePlotters());

    function commitStatusText(nextText) {
      window.clearTimeout(statusFadeTimeoutId);

      if (!displayedStatusText || !statusTextEl.textContent) {
        statusTextEl.classList.remove("is-fading");
        statusTextEl.textContent = nextText;
        displayedStatusText = nextText;
        statusLastCommitAtMs = performance.now();
        return;
      }

      statusTextEl.classList.add("is-fading");
      statusFadeTimeoutId = window.setTimeout(() => {
        statusTextEl.textContent = nextText;
        statusTextEl.classList.remove("is-fading");
        displayedStatusText = nextText;
        statusLastCommitAtMs = performance.now();
        statusFadeTimeoutId = 0;

        if (statusText !== displayedStatusText) {
          schedulePendingStatusUpdate();
        }
      }, STATUS_TEXT_FADE_MS);
    }

    function schedulePendingStatusUpdate() {
      window.clearTimeout(statusPendingTimeoutId);

      const remainingMs = Math.max(0, STATUS_TEXT_MIN_VISIBLE_MS - (performance.now() - statusLastCommitAtMs));
      if (remainingMs === 0) {
        commitStatusText(statusText);
        return;
      }

      statusPendingTimeoutId = window.setTimeout(() => {
        statusPendingTimeoutId = 0;
        if (statusText !== displayedStatusText) {
          commitStatusText(statusText);
        }
      }, remainingMs);
    }

    function setStatus(text) {
      if (text === statusText) return;
      statusText = text;

      if (statusFadeTimeoutId) {
        window.clearTimeout(statusFadeTimeoutId);
        statusFadeTimeoutId = 0;
        statusTextEl.classList.remove("is-fading");
      }

      if (!displayedStatusText || !statusTextEl.textContent) {
        commitStatusText(statusText);
        return;
      }

      schedulePendingStatusUpdate();
    }

    window.ofCurvesAndHandsNativeStatus = (text) => {
      if (typeof text !== "string") {
        return;
      }
      const trimmed = text.trim();
      if (!trimmed) {
        return;
      }
      setStatus(trimmed);
    };

    function pickRandomGridSize(excludeSize = null) {
      const choices = [];
      for (let size = GRID_SIZE_MIN; size <= GRID_SIZE_MAX; size += 1) {
        if (size !== excludeSize) {
          choices.push(size);
        }
      }

      if (choices.length === 0) {
        return GRID_SIZE_MIN;
      }

      return choices[Math.floor(Math.random() * choices.length)];
    }

    async function postBridgeJson(path, body = undefined) {
      const options = {
        method: "POST",
      };

      if (body !== undefined) {
        options.headers = {
          "Content-Type": "application/json",
        };
        options.body = JSON.stringify(body);
      }

      const response = await fetch(bridgeUrl(path), options);
      const data = await response.json().catch(() => ({}));
      return { response, data };
    }

    function noteUserActivity(reason = "interaction") {
      lastUserActivityAtMs = performance.now();
      if (passiveModeState === "running") {
        void stopPassiveMode(reason);
      }
    }

    async function ensureActiveModeForManualAction(reason = "manual") {
      lastUserActivityAtMs = performance.now();
      if (passiveModeState === "active") {
        return true;
      }

      if (passiveModeState === "running" || passiveModeState === "starting") {
        await stopPassiveMode(reason);
      }

      const waitStartedAtMs = performance.now();
      while (passiveModeState !== "active") {
        if (performance.now() - waitStartedAtMs > 5000) {
          return false;
        }
        await new Promise((resolve) => window.setTimeout(resolve, 50));
      }

      return true;
    }

    function plotterLabelForIndex(plotterIndex) {
      const matchedPlotter = availablePlotters.find((plotter) => plotter.plotter_index === plotterIndex);
      if (matchedPlotter) {
        return matchedPlotter.plotter_label;
      }
      return defaultPlotterLabelForIndex(plotterIndex);
    }

    function gamepadButtonLabel(buttonIndex) {
      return GAMEPAD_BUTTON_LABELS.get(buttonIndex) || `button ${buttonIndex}`;
    }

    function currentGamepad() {
      if (typeof navigator.getGamepads !== "function") {
        return null;
      }

      const gamepads = navigator.getGamepads();
      if (!gamepads) {
        activeGamepadIndex = null;
        return null;
      }

      if (activeGamepadIndex !== null) {
        const activeGamepad = gamepads[activeGamepadIndex];
        if (activeGamepad && activeGamepad.connected) {
          return activeGamepad;
        }
      }

      const fallbackGamepad = Array.from(gamepads).find((gamepad) => gamepad && gamepad.connected) || null;
      activeGamepadIndex = fallbackGamepad ? fallbackGamepad.index : null;
      return fallbackGamepad;
    }

    async function sendBridgeControl(path, successPrefix, body = undefined) {
      try {
        const { response, data } = await postBridgeJson(path, body);
        const message = data?.message || `Bridge error (${response.status})`;

        if (!response.ok) {
          setStatus(`${successPrefix}: ${message}`);
          return;
        }

        setStatus(`${successPrefix}: ${message}`);
      } catch (error) {
        console.error(error);
        setStatus(`${successPrefix}: could not reach plotter bridge`);
      }
    }

    async function setActiveGamepadPlotter(plotterIndex, buttonIndex) {
      await refreshAvailablePlotters();
      activeGamepadPlotterIndex = plotterIndex;
      eraseTraceModeArmed = false;
      if (!(await ensureActiveModeForManualAction("gamepad"))) {
        return;
      }

      await sendBridgeControl(
        "/controller/select-plotter",
        "Controller selection",
        {
          plotter_index: plotterIndex,
          source: "web-gamepad",
        }
      );
    }

    async function sendGamepadPenCommand(path, successPrefix) {
      await refreshAvailablePlotters();
      if (!(await ensureActiveModeForManualAction("gamepad"))) {
        return;
      }

      eraseTraceModeArmed = false;
      if (activeGamepadPlotterIndex === null) {
        setStatus(gamepadPlotterPrompt());
        return;
      }

      const plotterIndex = activeGamepadPlotterIndex;
      const plotterLabel = plotterLabelForIndex(plotterIndex);
      await sendBridgeControl(
        path,
        `${successPrefix} on Plotter ${plotterLabel}`,
        {
          plotter_index: plotterIndex,
          source: "web-gamepad",
        }
      );
    }

    async function sendGamepadServoToggleCommand() {
      await refreshAvailablePlotters();
      if (!(await ensureActiveModeForManualAction("gamepad"))) {
        return;
      }

      eraseTraceModeArmed = false;
      if (activeGamepadPlotterIndex === null) {
        setStatus(gamepadPlotterPrompt());
        return;
      }

      const plotterIndex = activeGamepadPlotterIndex;
      const plotterLabel = plotterLabelForIndex(plotterIndex);
      await sendBridgeControl(
        "/controller/servo-toggle",
        `Servo toggle on Plotter ${plotterLabel}`,
        {
          plotter_index: plotterIndex,
          source: "web-gamepad",
        }
      );
    }

    async function clearActiveGamepadPlotterSelection() {
      if (!(await ensureActiveModeForManualAction("gamepad"))) {
        return;
      }

      eraseTraceModeArmed = false;
      activeGamepadPlotterIndex = null;
      setStatus(`Controller selection cleared. ${READY_STATUS}`);
    }

    function handleGamepadButtonPress(buttonIndex) {
      const selectedPlotterIndex = gamepadPlotterByButtonIndex.get(buttonIndex);
      if (selectedPlotterIndex !== undefined) {
        void setActiveGamepadPlotter(selectedPlotterIndex, buttonIndex);
        return;
      }

      if (GAMEPAD_CLEAR_SELECTION_BUTTON_INDICES.includes(buttonIndex)) {
        void clearActiveGamepadPlotterSelection();
        return;
      }

      if (buttonIndex === GAMEPAD_SERVO_TOGGLE_BUTTON_INDEX) {
        void sendGamepadServoToggleCommand();
        return;
      }

      if (buttonIndex === GAMEPAD_PEN_UP_BUTTON_INDEX) {
        void sendGamepadPenCommand("/controller/pen-up", "Pen up");
        return;
      }

      if (buttonIndex === GAMEPAD_PEN_DOWN_BUTTON_INDEX) {
        void sendGamepadPenCommand("/controller/pen-down", "Pen down");
      }
    }

    function updateGamepadControls() {
      const gamepad = currentGamepad();
      if (!gamepad) {
        return;
      }

      let pressedState = gamepadPressedStateByIndex.get(gamepad.index);
      if (!pressedState) {
        pressedState = new Map();
        gamepadPressedStateByIndex.set(gamepad.index, pressedState);
      }

      for (const buttonIndex of GAMEPAD_WATCHED_BUTTON_INDICES) {
        const buttonState = gamepad.buttons?.[buttonIndex];
        const isPressed = Boolean(buttonState && buttonState.pressed);
        const wasPressed = Boolean(pressedState.get(buttonIndex));
        if (isPressed && !wasPressed) {
          handleGamepadButtonPress(buttonIndex);
        }
        pressedState.set(buttonIndex, isPressed);
      }
    }

    async function connectArduinoOnStartup() {
      try {
        const { response, data } = await postBridgeJson("/arduino/connect", {});
        if (!response.ok) {
          console.warn("Arduino auto-connect failed.", data?.message || `Bridge error (${response.status})`);
          return;
        }

        if (data?.status !== "done" && data?.status !== "already_connected") {
          console.warn("Arduino auto-connect skipped.", data?.message || "Arduino not connected.");
        }
      } catch (error) {
        console.warn("Arduino auto-connect unavailable.", error);
      }
    }

    async function startPassiveMode() {
      if (passiveModeState !== "active" || isDrawingKolam || lightboxVisible) {
        return;
      }

      passiveModeState = "starting";
      const requestId = passiveModeRequestId + 1;
      passiveModeRequestId = requestId;
      clearGuidedKolam(true);
      setStatus("No activity for 3 minutes. Starting passive mode...");

      try {
        const { response, data } = await postBridgeJson("/passive-mode/start", {});
        if (requestId !== passiveModeRequestId) {
          return;
        }

        if (!response.ok || data?.status === "error") {
          passiveModeState = "active";
          lastUserActivityAtMs = performance.now();
          setStatus(`${data?.message || `Passive mode error (${response.status})`} ${READY_STATUS}`);
          return;
        }

        if (data?.status === "done" || data?.status === "already_running") {
          passiveModeState = "running";
          setStatus(data?.message || PASSIVE_MODE_STATUS);
          return;
        }

        passiveModeState = "active";
        lastUserActivityAtMs = performance.now();
        setStatus(`${data?.message || "Passive mode did not start."} ${READY_STATUS}`);
      } catch (error) {
        if (requestId !== passiveModeRequestId) {
          return;
        }
        console.error(error);
        passiveModeState = "active";
        lastUserActivityAtMs = performance.now();
        setStatus(`Passive mode could not reach the plotter bridge. ${READY_STATUS}`);
      }
    }

    async function stopPassiveMode(reason = "activity") {
      if (passiveModeState !== "running" && passiveModeState !== "starting") {
        return;
      }

      passiveModeState = "stopping";
      const requestId = passiveModeRequestId + 1;
      passiveModeRequestId = requestId;
      setStatus("Returning to active mode...");

      try {
        const { response, data } = await postBridgeJson("/passive-mode/stop", { reason });
        if (requestId !== passiveModeRequestId) {
          return;
        }

        if (!response.ok || data?.status === "error") {
          passiveModeState = "active";
          lastUserActivityAtMs = performance.now();
          setStatus(`Passive mode stop failed. ${READY_STATUS}`);
          return;
        }

        passiveModeState = "active";
        lastUserActivityAtMs = performance.now();

        setStatus(`${data?.message || "Active mode is ready."} ${READY_STATUS}`);
      } catch (error) {
        if (requestId !== passiveModeRequestId) {
          return;
        }
        console.error(error);
        passiveModeState = "active";
        lastUserActivityAtMs = performance.now();
        setStatus(`Could not stop passive mode cleanly. ${READY_STATUS}`);
      }
    }

    function maybeStartPassiveMode() {}

    function resizeCanvas() {
      cssWidth = Math.max(1, stageViewportEl.clientWidth || window.innerWidth);
      cssHeight = Math.max(1, stageViewportEl.clientHeight || window.innerHeight);
      dpr = window.devicePixelRatio || 1;
      canvas.width = Math.round(cssWidth * dpr);
      canvas.height = Math.round(cssHeight * dpr);
      canvas.style.width = `${cssWidth}px`;
      canvas.style.height = `${cssHeight}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function syncInferenceCanvasSize() {
      const sourceWidth = video.videoWidth || 0;
      const sourceHeight = video.videoHeight || 0;
      if (!sourceWidth || !sourceHeight || !inferenceCtx) {
        return false;
      }

      if (inferenceCanvas.width !== sourceWidth || inferenceCanvas.height !== sourceHeight) {
        inferenceCanvas.width = sourceWidth;
        inferenceCanvas.height = sourceHeight;
      }

      return true;
    }

    function getHandposeFrameSource() {
      const normalizedRotation = ((CAMERA_ROTATION_DEGREES % 360) + 360) % 360;
      if (normalizedRotation === 0 || !syncInferenceCanvasSize()) {
        return video;
      }

      const frameWidth = inferenceCanvas.width;
      const frameHeight = inferenceCanvas.height;
      const rotationRadians = (normalizedRotation * Math.PI) / 180;

      // Rotate the raw webcam feed before inference so the detector and UI both
      // operate on an upright hand when the camera is mounted upside down.
      inferenceCtx.save();
      inferenceCtx.setTransform(1, 0, 0, 1, 0, 0);
      inferenceCtx.clearRect(0, 0, frameWidth, frameHeight);
      inferenceCtx.translate(frameWidth / 2, frameHeight / 2);
      inferenceCtx.rotate(rotationRadians);
      inferenceCtx.drawImage(video, -frameWidth / 2, -frameHeight / 2, frameWidth, frameHeight);
      inferenceCtx.restore();

      return inferenceCanvas;
    }

    function getDrawRect() {
      const videoAspect = video.videoWidth / video.videoHeight;
      const canvasAspect = cssWidth / cssHeight;
      let drawWidth;
      let drawHeight;
      let drawX;
      let drawY;

      if (videoAspect > canvasAspect) {
        drawHeight = cssHeight;
        drawWidth = drawHeight * videoAspect;
        drawX = (cssWidth - drawWidth) / 2;
        drawY = 0;
      } else {
        drawWidth = cssWidth;
        drawHeight = drawWidth / videoAspect;
        drawX = 0;
        drawY = (cssHeight - drawHeight) / 2;
      }

      return { drawX, drawY, drawWidth, drawHeight };
    }

    function getGridGeometry(drawX, drawY, drawWidth, drawHeight) {
      const visibleLeft = Math.max(0, drawX);
      const visibleTop = Math.max(0, drawY);
      const visibleRight = Math.min(cssWidth, drawX + drawWidth);
      const visibleBottom = Math.min(cssHeight, drawY + drawHeight);

      const visibleWidth = Math.max(0, visibleRight - visibleLeft);
      const visibleHeight = Math.max(0, visibleBottom - visibleTop);
      const outerMargin = Math.max(
        GRID_SAFE_PADDING_PX,
        Math.min(visibleWidth, visibleHeight) * GRID_MARGIN_RATIO
      );

      const innerWidth = Math.max(0, visibleWidth - outerMargin * 2);
      const innerHeight = Math.max(0, visibleHeight - outerMargin * 2);
      const side = Math.min(innerWidth, innerHeight);

      const startX = visibleLeft + (visibleWidth - side) / 2;
      const startY = visibleTop + (visibleHeight - side) / 2;
      const gridWidth = side;
      const gridHeight = side;
      const stepX = gridWidth / Math.max(1, currentGridSize - 1);
      const stepY = gridHeight / Math.max(1, currentGridSize - 1);
      return { startX, startY, gridWidth, gridHeight, stepX, stepY };
    }

    function getGridData(drawX, drawY, drawWidth, drawHeight) {
      const geometry = getGridGeometry(drawX, drawY, drawWidth, drawHeight);
      const pullis = [];

      if (geometry.gridWidth <= 0 || geometry.gridHeight <= 0) {
        return {
          ...geometry,
          pullis,
          styleSpacing: 0,
          lockRadius: 0,
        };
      }

      for (let row = 0; row < currentGridSize; row += 1) {
        for (let col = 0; col < currentGridSize; col += 1) {
          pullis.push({
            x: geometry.startX + col * geometry.stepX,
            y: geometry.startY + row * geometry.stepY,
          });
        }
      }

      const styleSpacing = Math.min(geometry.stepX, geometry.stepY);
      const lockRadius = Math.max(10, styleSpacing * DOT_LOCK_RATIO);

      return {
        ...geometry,
        pullis,
        styleSpacing,
        lockRadius,
      };
    }

    function drawKolamGrid(grid) {
      if (grid.gridWidth <= 0 || grid.gridHeight <= 0) return;

      const dotRadius = Math.max(1.8, Math.min(grid.stepX, grid.stepY) * 0.08);
      const nextDotIndices = activeDotIndex !== null
        ? new Set(getUnvisitedAdjacentDotIndices(activeDotIndex))
        : null;
      for (let i = 0; i < grid.pullis.length; i += 1) {
        const dot = grid.pullis[i];
        const isVisited = visitedDots.has(i);
        const isNextDot = !!nextDotIndices?.has(i);
        ctx.beginPath();
        ctx.arc(dot.x, dot.y, dotRadius, 0, Math.PI * 2);
        ctx.fillStyle = isVisited
          ? "rgba(255, 255, 255, 0.98)"
          : isNextDot
            ? NEXT_DOT_COLOR
            : "rgba(255, 255, 255, 0.28)";
        ctx.fill();
      }
    }

    function toCanvasPoint(point, drawRect) {
      return {
        x: drawRect.drawX + (1 - point.x) * drawRect.drawWidth,
        y: drawRect.drawY + point.y * drawRect.drawHeight,
      };
    }

    function snapPointToKolamGuide(point, grid) {
      if (grid.gridWidth <= 0 || grid.gridHeight <= 0 || grid.stepX <= 0 || grid.stepY <= 0) {
        return point;
      }

      const latticeStepX = grid.stepX / 2;
      const latticeStepY = grid.stepY / 2;
      const maxX = grid.startX + grid.gridWidth;
      const maxY = grid.startY + grid.gridHeight;

      const snappedIx = Math.round((point.x - grid.startX) / latticeStepX);
      const snappedIy = Math.round((point.y - grid.startY) / latticeStepY);
      const snapX = grid.startX + snappedIx * latticeStepX;
      const snapY = grid.startY + snappedIy * latticeStepY;

      if (snapX < grid.startX || snapX > maxX || snapY < grid.startY || snapY > maxY) {
        return point;
      }

      const dist = Math.hypot(snapX - point.x, snapY - point.y);
      if (dist > SNAP_RADIUS_PX) {
        return point;
      }

      return {
        x: snapX,
        y: snapY,
      };
    }

    function selectBestPinchHand(hands) {
      let best = null;

      for (const hand of hands) {
        const thumbTip = hand?.[4];
        const indexTip = hand?.[8];
        const wrist = hand?.[0];
        const middleMcp = hand?.[9];
        if (!thumbTip || !indexTip || !wrist || !middleMcp) continue;

        const pinchDistance = Math.hypot(
          thumbTip.x - indexTip.x,
          thumbTip.y - indexTip.y
        );
        const handScale = Math.max(
          0.0001,
          Math.hypot(wrist.x - middleMcp.x, wrist.y - middleMcp.y)
        );
        const pinchRatio = pinchDistance / handScale;

        if (!best || pinchRatio < best.pinchRatio) {
          best = { indexTip, pinchRatio };
        }
      }

      return best;
    }

    function landmarkDistance(a, b) {
      if (!a || !b) {
        return Infinity;
      }
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function isFingerCurled(hand, tipIndex, pipIndex, mcpIndex) {
      const wrist = hand?.[0];
      const tip = hand?.[tipIndex];
      const pip = hand?.[pipIndex];
      const mcp = hand?.[mcpIndex];
      if (!wrist || !tip || !pip || !mcp) {
        return false;
      }

      const tipToMcp = landmarkDistance(tip, mcp);
      const pipToMcp = Math.max(0.0001, landmarkDistance(pip, mcp));
      const tipToWrist = landmarkDistance(tip, wrist);
      const pipToWrist = landmarkDistance(pip, wrist);

      return (
        tipToMcp < pipToMcp * FIST_FINGER_CURL_RATIO
        || tipToWrist < pipToWrist * 0.98
      );
    }

    function isFist(hand) {
      const wrist = hand?.[0];
      const indexMcp = hand?.[5];
      const middleMcp = hand?.[9];
      const pinkyMcp = hand?.[17];
      if (!wrist || !indexMcp || !middleMcp || !pinkyMcp) {
        return false;
      }

      const handScale = Math.max(
        0.0001,
        landmarkDistance(wrist, middleMcp),
        landmarkDistance(wrist, indexMcp),
        landmarkDistance(wrist, pinkyMcp)
      );

      const curledCount = [
        isFingerCurled(hand, 8, 6, 5),
        isFingerCurled(hand, 12, 10, 9),
        isFingerCurled(hand, 16, 14, 13),
        isFingerCurled(hand, 20, 18, 17),
      ].filter(Boolean).length;

      const palmCenter = {
        x: (wrist.x + indexMcp.x + middleMcp.x + pinkyMcp.x) / 4,
        y: (wrist.y + indexMcp.y + middleMcp.y + pinkyMcp.y) / 4,
      };

      const thumbTip = hand?.[4];
      const thumbToPalmRatio = landmarkDistance(thumbTip, palmCenter) / handScale;
      const thumbToIndexRatio = landmarkDistance(thumbTip, indexMcp) / handScale;
      const thumbClosed =
        thumbToPalmRatio < FIST_THUMB_PALM_RATIO
        || thumbToIndexRatio < FIST_THUMB_INDEX_RATIO;

      return curledCount >= 3 && (thumbClosed || curledCount === 4);
    }

    function indexToRowCol(index) {
      return {
        row: Math.floor(index / currentGridSize),
        col: index % currentGridSize,
      };
    }

    function areAdjacentDotIndices(a, b) {
      const aRC = indexToRowCol(a);
      const bRC = indexToRowCol(b);
      return Math.abs(aRC.row - bRC.row) + Math.abs(aRC.col - bRC.col) === 1;
    }

    function getVectorBetweenDots(fromIndex, toIndex) {
      const fromRC = indexToRowCol(fromIndex);
      const toRC = indexToRowCol(toIndex);
      return [toRC.col - fromRC.col, toRC.row - fromRC.row];
    }

    function getAdjacentDotIndices(index) {
      const { row, col } = indexToRowCol(index);
      const adjacent = [];

      if (row > 0) adjacent.push((row - 1) * currentGridSize + col);
      if (col < currentGridSize - 1) adjacent.push(row * currentGridSize + col + 1);
      if (row < currentGridSize - 1) adjacent.push((row + 1) * currentGridSize + col);
      if (col > 0) adjacent.push(row * currentGridSize + col - 1);

      return adjacent;
    }

    function findNearestDotIndex(point, pullis, maxDist) {
      let bestIndex = -1;
      let bestDist = maxDist;

      for (let i = 0; i < pullis.length; i += 1) {
        const dot = pullis[i];
        const dist = Math.hypot(point.x - dot.x, point.y - dot.y);
        if (dist <= bestDist) {
          bestDist = dist;
          bestIndex = i;
        }
      }

      return bestIndex;
    }

    function findNearestUnvisitedDotIndex(point, pullis, maxDist) {
      let bestIndex = -1;
      let bestDist = maxDist;

      for (let i = 0; i < pullis.length; i += 1) {
        if (visitedDots.has(i)) continue;

        const dot = pullis[i];
        const dist = Math.hypot(point.x - dot.x, point.y - dot.y);
        if (dist <= bestDist) {
          bestDist = dist;
          bestIndex = i;
        }
      }

      return bestIndex;
    }

    function findNearestAdjacentDotIndex(point, grid, fromIndex, maxDist) {
      let bestIndex = -1;
      let bestDist = maxDist;

      for (const index of getAdjacentDotIndices(fromIndex)) {
        const dot = grid.pullis[index];
        if (!dot) continue;

        const dist = Math.hypot(point.x - dot.x, point.y - dot.y);
        if (dist <= bestDist) {
          bestDist = dist;
          bestIndex = index;
        }
      }

      return bestIndex;
    }

    function findNearestAdjacentUnvisitedDotIndex(point, grid, fromIndex, maxDist) {
      let bestIndex = -1;
      let bestDist = maxDist;

      for (const index of getAdjacentDotIndices(fromIndex)) {
        if (visitedDots.has(index)) continue;

        const dot = grid.pullis[index];
        if (!dot) continue;

        const dist = Math.hypot(point.x - dot.x, point.y - dot.y);
        if (dist <= bestDist) {
          bestDist = dist;
          bestIndex = index;
        }
      }

      return bestIndex;
    }

    function getEdgePairKey(a, b) {
      return a < b ? `${a}:${b}` : `${b}:${a}`;
    }

    function hasUnvisitedDots(grid) {
      return grid.pullis.some((_, index) => !visitedDots.has(index));
    }

    function getPostBranchStatus(grid) {
      return hasUnvisitedDots(grid) ? NEXT_BRANCH_STATUS : ALL_VISITED_STATUS;
    }

    function getUnvisitedAdjacentDotIndices(index) {
      return getAdjacentDotIndices(index).filter((dotIndex) => !visitedDots.has(dotIndex));
    }

    function isActiveBranchBlocked() {
      return activeDotIndex !== null && getUnvisitedAdjacentDotIndices(activeDotIndex).length === 0;
    }

    function markDotVisited(dotIndex, nowMs) {
      visitedDots.add(dotIndex);
      if (!visitedDotTimesMs.has(dotIndex)) {
        visitedDotTimesMs.set(dotIndex, nowMs);
      }
    }

    function getRevealAtMsForDots(dotIndices) {
      let latestVisitMs = -Infinity;

      for (const dotIndex of dotIndices) {
        const visitedAtMs = visitedDotTimesMs.get(dotIndex);
        if (typeof visitedAtMs !== "number") {
          return Infinity;
        }
        latestVisitMs = Math.max(latestVisitMs, visitedAtMs);
      }

      return latestVisitMs + KOLAM_REVEAL_DELAY_MS;
    }

    function beginBranch(dotIndex, nowMs) {
      if (visitedDots.has(dotIndex)) {
        return false;
      }

      activeBranchId = nextBranchId;
      nextBranchId += 1;
      activeDotIndex = dotIndex;
      activeLastVector = null;
      activeBranchPath = [dotIndex];
      activeBranchEdgeCount = 0;
      lastEdgeAtMs = 0;
      lastEdgePairKey = "";
      markDotVisited(dotIndex, nowMs);
      return true;
    }

    function addFrameworkEdge(nextDotIndex, nowMs) {
      if (
        activeDotIndex === null
        || nextDotIndex === activeDotIndex
        || visitedDots.has(nextDotIndex)
      ) {
        return false;
      }

      const currentDotIndex = activeDotIndex;
      const edgePairKey = getEdgePairKey(currentDotIndex, nextDotIndex);
      if (
        edgePairKey === lastEdgePairKey
        && nowMs - lastEdgeAtMs < EDGE_REPEAT_COOLDOWN_MS
      ) {
        return false;
      }

      const vector = getVectorBetweenDots(currentDotIndex, nextDotIndex);
      framework.push({
        x: currentDotIndex,
        y: nextDotIndex,
        branchId: activeBranchId,
        reverse: false,
        vector,
        isBranchStart: activeBranchEdgeCount === 0,
        revealAtMs: nowMs + KOLAM_REVEAL_DELAY_MS,
      });

      activeDotIndex = nextDotIndex;
      activeLastVector = vector;
      activeBranchPath.push(nextDotIndex);
      activeBranchEdgeCount += 1;
      markDotVisited(nextDotIndex, nowMs);
      lastEdgeAtMs = nowMs;
      lastEdgePairKey = edgePairKey;
      return true;
    }

    function finalizeActiveBranch(nowMs = performance.now()) {
      if (activeDotIndex === null) {
        return;
      }

      let rAngle = 0;
      if (activeLastVector) {
        rAngle = Math.atan2(activeLastVector[1], activeLastVector[0]) + Math.PI;
      }

      const stop = activeBranchEdgeCount === 0 ? (9 * Math.PI) / 4 : (7 * Math.PI) / 4;
      capArcs.push({
        dotIndex: activeDotIndex,
        branchId: activeBranchId,
        angle: rAngle,
        start: Math.PI / 4,
        stop,
        revealAtMs: nowMs + KOLAM_REVEAL_DELAY_MS,
      });

      let reverseRevealAtMs = nowMs + KOLAM_REVEAL_DELAY_MS * 2;
      for (let i = activeBranchPath.length - 1; i > 0; i -= 1) {
        const childIndex = activeBranchPath[i];
        const parentIndex = activeBranchPath[i - 1];
        framework.push({
          x: childIndex,
          y: parentIndex,
          branchId: activeBranchId,
          reverse: true,
          vector: getVectorBetweenDots(childIndex, parentIndex),
          isBranchStart: false,
          revealAtMs: reverseRevealAtMs,
        });
        reverseRevealAtMs += KOLAM_REVEAL_DELAY_MS;
      }

      activeDotIndex = null;
      activeBranchId = null;
      activeLastVector = null;
      activeBranchPath = [];
      activeBranchEdgeCount = 0;
      lastEdgeAtMs = 0;
      lastEdgePairKey = "";
    }

    function clearGuidedKolam(silent = false, excludeSize = currentGridSize) {
      currentGridSize = pickRandomGridSize(excludeSize);
      framework.length = 0;
      capArcs.length = 0;
      visitedDots.clear();
      visitedDotTimesMs.clear();
      activeDotIndex = null;
      activeBranchId = null;
      activeLastVector = null;
      activeBranchPath = [];
      activeBranchEdgeCount = 0;
      lastEdgeAtMs = 0;
      lastEdgePairKey = "";
      nextBranchId = 1;
      hoverDotIndex = -1;
      isPinching = false;
      fistLatched = false;
      fistStartedAtMs = 0;
      pinchPoint = null;
      smoothedPoint = null;
      if (!silent) {
        setStatus(`Kolam cleared. ${READY_STATUS}`);
      }
    }

    function updateLightboxCountdown() {
      if (!lightboxVisible) {
        return;
      }

      const remainingMs = Math.max(0, lightboxEndsAtMs - performance.now());
      const secondsRemaining = Math.max(1, Math.ceil(remainingMs / 1000));
      const footerText = `Draw another Kolam in ${secondsRemaining}...`;
      lightboxFooterEl.textContent = footerText;

      if (remainingMs <= 0) {
        void closePlotterLightbox();
      }
    }

    function settlePlotterLightbox(afterStatus = "") {
      if (afterStatus) {
        lightboxAfterStatus = afterStatus;
      }
      lightboxRequestPending = false;
      lightboxEndsAtMs = performance.now() + LIGHTBOX_DURATION_MS;
      currentPlotClientRequestId = null;
      stopLightboxPlotterPolling();
      updateLightboxCountdown();
    }

    function setLightboxAssignedPlotter(label = null) {
      const normalizedLabel = normalizePlotterLabel(label);
      const mockupUrl = normalizedLabel ? PLOTTER_MOCKUP_URL_BY_LABEL[normalizedLabel] || null : null;
      lightboxAssignedPlotterLabel = normalizedLabel;
      if (plotterSideTitleEl) {
        plotterSideTitleEl.textContent = normalizedLabel ? `Plotter ${normalizedLabel}` : "Waiting for plotter";
      }
      if (plotterSideCopyEl) {
        plotterSideCopyEl.textContent = normalizedLabel
          ? `Look to plotter ${normalizedLabel} for your kolam!`
          : lightboxPlotterFallbackCopy;
      }
      if (plotterMockupImageEl) {
        if (mockupUrl) {
          plotterMockupImageEl.src = mockupUrl;
          plotterMockupImageEl.alt = `Plotter ${normalizedLabel} mockup`;
          plotterMockupImageEl.hidden = false;
          plotterMockupImageEl.classList.add("visible");
        } else {
          plotterMockupImageEl.alt = "";
          plotterMockupImageEl.hidden = true;
          plotterMockupImageEl.classList.remove("visible");
        }
      }
    }

    function stopLightboxPlotterPolling() {
      if (lightboxPlotterPollId) {
        window.clearTimeout(lightboxPlotterPollId);
        lightboxPlotterPollId = 0;
      }
      lightboxPlotterPollToken += 1;
    }

    async function syncLightboxAssignedPlotter(token) {
      if (!lightboxVisible || token !== lightboxPlotterPollToken || lightboxAssignedPlotterLabel) {
        return;
      }

      try {
        const response = await fetch(bridgeUrl("/dashboard/state"));
        const data = await response.json().catch(() => ({}));
        if (!response.ok || !lightboxVisible || token !== lightboxPlotterPollToken || lightboxAssignedPlotterLabel) {
          return;
        }

        const bridgePlotters = visibleBridgePlotters(data?.plotters);
        setAvailablePlotters(bridgePlotters, { fallbackWhenEmpty: false });
        void ensureDedicatedPassivePlotter(data);

        const assignedLabelFromRequest = plotRequestAssignmentFromState(data, currentPlotClientRequestId);
        if (assignedLabelFromRequest) {
          setLightboxAssignedPlotter(assignedLabelFromRequest);
          return;
        }

        const busyPlotters = Array.isArray(data?.plotters)
          ? data.plotters.filter((plotter) => plotter && plotter.status === "busy" && plotter.plotter_label)
          : [];
        if (busyPlotters.length === 1) {
          setLightboxAssignedPlotter(busyPlotters[0].plotter_label);
          return;
        }
      } catch (error) {
        console.debug("Could not fetch live plotter assignment.", error);
      }

      if (!lightboxVisible || token !== lightboxPlotterPollToken || lightboxAssignedPlotterLabel) {
        return;
      }

      lightboxPlotterPollId = window.setTimeout(() => {
        void syncLightboxAssignedPlotter(token);
      }, 250);
    }

    function startLightboxPlotterPolling() {
      stopLightboxPlotterPolling();
      const token = lightboxPlotterPollToken;
      void syncLightboxAssignedPlotter(token);
    }

    function openPlotterLightbox(title, message = "", previewSvg = "", afterStatus = "") {
      lightboxVisible = true;
      lightboxEndsAtMs = performance.now() + LIGHTBOX_DURATION_MS;
      lightboxRequestPending = true;
      lightboxTitleEl.textContent = title;
      lightboxMessage = message;
      lightboxAfterStatus = afterStatus;
      lightboxPlotterFallbackCopy = "Assigning your kolam to an available plotter...";
      lightboxMessageEl.textContent = message;
      if (previewSvg) {
        lightboxPreviewEl.src = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(previewSvg)}`;
      } else {
        lightboxPreviewEl.removeAttribute("src");
      }
      setLightboxAssignedPlotter(null);
      lightboxEl.classList.add("visible");
      startLightboxPlotterPolling();
      updateLightboxCountdown();
    }

    async function closePlotterLightbox() {
      if (!lightboxVisible) {
        return;
      }

      lightboxVisible = false;
      lightboxEndsAtMs = 0;
      lightboxRequestPending = false;
      lightboxMessage = "";
      lightboxPlotterFallbackCopy = "All plotters are busy right now!";
      stopLightboxPlotterPolling();
      lightboxEl.classList.remove("visible");
      lightboxMessageEl.textContent = "";
      lightboxFooterEl.textContent = "";
      lightboxPreviewEl.removeAttribute("src");
      setLightboxAssignedPlotter(null);
      currentPlotClientRequestId = null;
      clearGuidedKolam(true);
      isDrawingKolam = false;
      results = null;
      lastUserActivityAtMs = performance.now();
      try {
        await video.play();
      } catch (error) {
        console.warn("Could not resume video feed.", error);
      }

      if (lightboxAfterStatus) {
        setStatus(lightboxAfterStatus);
      } else {
        setStatus(`Ready for a new kolam. ${READY_STATUS}`);
      }
      lightboxAfterStatus = "";
    }

    function formatNum(value) {
      return Number(value.toFixed(2));
    }

    function updateGuidedKolamFromHands(hands, drawRect, grid) {
      if (isDrawingKolam || passiveModeState !== "active") {
        isPinching = false;
        hoverDotIndex = -1;
        pinchPoint = null;
        smoothedPoint = null;
        return;
      }

      const nowMs = performance.now();
      const hasKolamPath =
        framework.length > 0 || capArcs.length > 0 || activeDotIndex !== null;
      const candidate = selectBestPinchHand(hands);
      const pinchThreshold = isPinching ? PINCH_END_RATIO : PINCH_START_RATIO;
      const shouldPinch = !!candidate && candidate.pinchRatio <= pinchThreshold;

      const primaryHand = hands?.[0] || null;
      const fistNow =
        !!primaryHand
        && hasKolamPath
        && (nowMs - lastPlotTriggerAtMs) > PLOTTER_TRIGGER_COOLDOWN_MS
        && isFist(primaryHand);

      if (fistNow) {
        if (fistStartedAtMs === 0) {
          fistStartedAtMs = nowMs;
        }

        const fistHeldMs = nowMs - fistStartedAtMs;
        if (!fistLatched && fistHeldMs >= FIST_HOLD_MS) {
          finalizeActiveBranch(nowMs);
          isPinching = false;
          hoverDotIndex = -1;
          pinchPoint = null;
          smoothedPoint = null;
          lastPlotTriggerAtMs = nowMs;
          void drawKolamOnPlotter(grid);
          fistLatched = true;
        } else if (!fistLatched) {
          const holdProgress = Math.min(100, Math.round((fistHeldMs / FIST_HOLD_MS) * 100));
          setStatus(`Make and hold a fist to draw your kolam (${holdProgress}%).`);
        }
        return;
      }

      fistStartedAtMs = 0;
      fistLatched = false;

      if (shouldPinch) {
        const rawPoint = toCanvasPoint(candidate.indexTip, drawRect);
        const snappedPoint = snapPointToKolamGuide(rawPoint, grid);
        const startLockRadius = Math.max(12, grid.lockRadius * START_DOT_LOCK_RATIO);
        const nextLockRadius = Math.max(14, grid.lockRadius * NEXT_DOT_LOCK_RATIO);

        if (!smoothedPoint) {
          smoothedPoint = { ...snappedPoint };
        } else {
          smoothedPoint.x += (snappedPoint.x - smoothedPoint.x) * PINCH_SMOOTHING;
          smoothedPoint.y += (snappedPoint.y - smoothedPoint.y) * PINCH_SMOOTHING;
        }

        pinchPoint = { x: smoothedPoint.x, y: smoothedPoint.y };
        const nearestDotIndex = findNearestDotIndex(
          pinchPoint,
          grid.pullis,
          activeDotIndex === null ? startLockRadius : nextLockRadius
        );
        const nearestUnvisitedDotIndex = activeDotIndex === null
          ? findNearestUnvisitedDotIndex(pinchPoint, grid.pullis, startLockRadius)
          : -1;
        let branchBlockedThisFrame = false;
        let nearestAdjacentDotIndex = -1;

        if (activeDotIndex === null) {
          hoverDotIndex = nearestUnvisitedDotIndex;
          if (hoverDotIndex !== -1) {
            const started = beginBranch(hoverDotIndex, nowMs);
            hoverDotIndex = -1;
            if (started && isActiveBranchBlocked()) {
              finalizeActiveBranch(nowMs);
              branchBlockedThisFrame = true;
            }
          }
        } else {
          const currentDotIndex = activeDotIndex;
          const availableNextDots = getUnvisitedAdjacentDotIndices(currentDotIndex);
          if (availableNextDots.length === 0) {
            finalizeActiveBranch(nowMs);
            hoverDotIndex = -1;
            branchBlockedThisFrame = true;
          } else {
            nearestAdjacentDotIndex = findNearestAdjacentDotIndex(
              pinchPoint,
              grid,
              currentDotIndex,
              nextLockRadius
            );
            const candidateNextUnvisitedDotIndex = findNearestAdjacentUnvisitedDotIndex(
              pinchPoint,
              grid,
              currentDotIndex,
              nextLockRadius
            );

            const revisitsActiveBranch =
              nearestAdjacentDotIndex !== -1
              && activeBranchPath.includes(nearestAdjacentDotIndex);
            hoverDotIndex = revisitsActiveBranch ? -1 : candidateNextUnvisitedDotIndex;

            if (hoverDotIndex !== -1 && nowMs - lastEdgeAtMs >= EDGE_COOLDOWN_MS) {
              const added = addFrameworkEdge(hoverDotIndex, nowMs);
              if (added && isActiveBranchBlocked()) {
                finalizeActiveBranch(nowMs);
                hoverDotIndex = -1;
                branchBlockedThisFrame = true;
              }
            }
          }
        }

        if (branchBlockedThisFrame) {
          setStatus(hasUnvisitedDots(grid) ? BLOCKED_BRANCH_STATUS : ALL_VISITED_STATUS);
        } else if (activeDotIndex === null) {
          if (!hasUnvisitedDots(grid)) {
            setStatus("All pullis (dot) have been visited. Form a fist to draw your kolam instead.");
          } else if (nearestDotIndex !== -1 && nearestUnvisitedDotIndex === -1) {
            setStatus("That dot is already visited. Move to an unvisited dot to start a new branch.");
          } else {
            setStatus("Pinch closer to an unvisited dot to start a branch.");
          }
        } else if (
          nearestDotIndex !== -1
          && nearestDotIndex !== activeDotIndex
          && !areAdjacentDotIndices(activeDotIndex, nearestDotIndex)
        ) {
          setStatus("Only neighboring dots are allowed while a branch is active.");
        } else if (
          nearestAdjacentDotIndex !== -1
          && activeBranchPath.includes(nearestAdjacentDotIndex)
          && nearestAdjacentDotIndex !== activeDotIndex
        ) {
          setStatus("Release to end branch or find an unvisited dot!");
        } else if (
          nearestAdjacentDotIndex !== -1
          && nearestAdjacentDotIndex !== activeDotIndex
          && visitedDots.has(nearestAdjacentDotIndex)
        ) {
          setStatus("That neighboring dot is already visited. Move toward an unvisited neighbor.");
        } else if (hoverDotIndex === -1) {
          setStatus("Keep pinching and move toward one of the unvisited neighboring dots.");
        } else {
          setStatus(ACTIVE_BRANCH_STATUS);
        }
      } else {
        if (isPinching) {
          finalizeActiveBranch(nowMs);
        }

        hoverDotIndex = -1;
        pinchPoint = null;
        smoothedPoint = null;
        setStatus(framework.length > 0 || capArcs.length > 0 ? getPostBranchStatus(grid) : READY_STATUS);
      }

      isPinching = shouldPinch;
    }

    function approxEqual(a, b, tol = 1e-6) {
      return Math.abs(a - b) <= tol;
    }

    function drawConnectorLine(dot1, dot2, spacing, reverse = false) {
      const radius = (spacing * 0.66) / 2;
      const cornerOffset = radius / Math.sqrt(2);
      const dx = (dot2.x - dot1.x) / spacing;
      const dy = (dot2.y - dot1.y) / spacing;
      const side = reverse ? -1 : 1;
      const perpX = -dy;
      const perpY = dx;
      const offsetX = cornerOffset * (dx + side * perpX);
      const offsetY = cornerOffset * (dy + side * perpY);

      return {
        x1: dot1.x + offsetX,
        y1: dot1.y + offsetY,
        x2: dot2.x - offsetX,
        y2: dot2.y - offsetY,
      };
    }

    function loopArc(dot, angle, start, stop, spacing) {
      return {
        cx: dot.x,
        cy: dot.y,
        radius: (spacing * 0.66) / 2,
        rotation: angle,
        start,
        stop,
      };
    }

    function applyLoops(aDiff, rAngle, dot, spacing) {
      if (approxEqual(aDiff, 0)) {
        return [
          {
            kind: "arc",
            arc: loopArc(dot, rAngle, Math.PI / 4, (3 * Math.PI) / 4, spacing),
          },
        ];
      }

      if (approxEqual(aDiff, -90) || approxEqual(aDiff, 270)) {
        return [
          {
            kind: "arc",
            arc: loopArc(dot, rAngle, Math.PI / 4, (5 * Math.PI) / 4, spacing),
          },
        ];
      }

      if (approxEqual(aDiff, 90) || approxEqual(aDiff, -270)) {
        return [
          {
            kind: "arc",
            arc: loopArc(dot, rAngle + Math.PI / 2, Math.PI / 4, (5 * Math.PI) / 4, spacing),
          },
        ];
      }

      return [];
    }

    function buildGuidedCommands(grid) {
      const commands = [];
      const angleArray = [];
      const spacing = grid.styleSpacing;

      if (!spacing || grid.pullis.length === 0) {
        return commands;
      }

      // Port of DFSKolamGenerator.render_commands from the Python plotter sketch.
      for (let i = 0; i < framework.length; i += 1) {
        const edge = framework[i];
        const dot1 = grid.pullis[edge.x];
        const dot2 = grid.pullis[edge.y];
        if (!dot1 || !dot2) continue;

        const rAngle = Math.atan2(dot2.y - dot1.y, dot2.x - dot1.x);
        const angleDeg = (rAngle * 180) / Math.PI;
        const edgeRevealAtMs = edge.revealAtMs ?? getRevealAtMsForDots([edge.x, edge.y]);
        const prevEdge = i > 0 ? framework[i - 1] : null;
        const prevEdgeRevealAtMs = prevEdge
          ? (prevEdge.revealAtMs ?? getRevealAtMsForDots([prevEdge.x, prevEdge.y]))
          : edgeRevealAtMs;
        const turnRevealAtMs = prevEdge
          ? Math.max(edgeRevealAtMs, prevEdgeRevealAtMs)
          : edgeRevealAtMs;
        angleArray.push(angleDeg);

        if (edge.isBranchStart) {
          commands.push({
            kind: "line",
            line: drawConnectorLine(dot1, dot2, spacing, true),
            revealAtMs: edgeRevealAtMs,
          });
          commands.push({
            kind: "arc",
            arc: loopArc(dot1, rAngle, Math.PI / 4, (7 * Math.PI) / 4, spacing),
            revealAtMs: edgeRevealAtMs,
          });
          continue;
        }

        const prevA = i > 0 ? angleArray[i - 1] : 0;
        const aDiff = angleDeg - prevA;

        if (i % 2 === 1) {
          if (!(approxEqual(aDiff, 90) || approxEqual(aDiff, -270))) {
            commands.push(
              ...applyLoops(aDiff, rAngle, dot1, spacing).map((command) => ({
                ...command,
                revealAtMs: turnRevealAtMs,
              }))
            );
          }
          commands.push({
            kind: "line",
            line: drawConnectorLine(dot1, dot2, spacing, false),
            revealAtMs: edgeRevealAtMs,
          });
        } else {
          if (approxEqual(aDiff, 90) || approxEqual(aDiff, -270)) {
            commands.push(
              ...applyLoops(aDiff, rAngle, dot1, spacing).map((command) => ({
                ...command,
                revealAtMs: turnRevealAtMs,
              }))
            );
          } else if (approxEqual(aDiff, 0)) {
            commands.push(
              ...applyLoops(0, rAngle + Math.PI, dot1, spacing).map((command) => ({
                ...command,
                revealAtMs: turnRevealAtMs,
              }))
            );
          }
          commands.push({
            kind: "line",
            line: drawConnectorLine(dot1, dot2, spacing, true),
            revealAtMs: edgeRevealAtMs,
          });
        }
      }

      for (const capInfo of capArcs) {
        const dot = grid.pullis[capInfo.dotIndex];
        if (!dot) continue;
        commands.push({
          kind: "arc",
          arc: loopArc(dot, capInfo.angle, capInfo.start, capInfo.stop, spacing),
          revealAtMs: capInfo.revealAtMs ?? getRevealAtMsForDots([capInfo.dotIndex]),
        });
      }

      return commands;
    }

    function distanceBetweenPoints(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function sampleCommandPoints(command) {
      if (command.kind === "line" && command.line) {
        return [
          { x: command.line.x1, y: command.line.y1 },
          { x: command.line.x2, y: command.line.y2 },
        ];
      }

      if (command.kind === "arc" && command.arc) {
        return sampleArcPoints(command.arc);
      }

      return [];
    }

    function appendPointsToPolyline(polyline, points) {
      for (const point of points) {
        const lastPoint = polyline[polyline.length - 1];
        if (!lastPoint || distanceBetweenPoints(lastPoint, point) > 1e-6) {
          polyline.push({ x: point.x, y: point.y });
        }
      }
    }

    function commandPointAtArc(arc, theta) {
      const localX = arc.radius * Math.cos(theta);
      const localY = arc.radius * Math.sin(theta);
      const rotatedX = Math.cos(arc.rotation) * localX - Math.sin(arc.rotation) * localY;
      const rotatedY = Math.sin(arc.rotation) * localX + Math.cos(arc.rotation) * localY;
      return { x: arc.cx + rotatedX, y: arc.cy + rotatedY };
    }

    function commandEndpoints(command) {
      if (command.kind === "line" && command.line) {
        return [
          { x: command.line.x1, y: command.line.y1 },
          { x: command.line.x2, y: command.line.y2 },
        ];
      }

      if (command.kind === "arc" && command.arc) {
        return [
          commandPointAtArc(command.arc, command.arc.start),
          commandPointAtArc(command.arc, command.arc.stop),
        ];
      }

      throw new Error(`Unsupported command kind: ${command.kind}`);
    }

    function reverseCommand(command) {
      if (command.kind === "line" && command.line) {
        return {
          ...command,
          line: {
            x1: command.line.x2,
            y1: command.line.y2,
            x2: command.line.x1,
            y2: command.line.y1,
          },
        };
      }

      if (command.kind === "arc" && command.arc) {
        return {
          ...command,
          arc: {
            cx: command.arc.cx,
            cy: command.arc.cy,
            radius: command.arc.radius,
            rotation: command.arc.rotation,
            start: command.arc.stop,
            stop: command.arc.start,
          },
        };
      }

      return command;
    }

    function pointKey(point) {
      return `${point.x.toFixed(6)},${point.y.toFixed(6)}`;
    }

    function stitchGuidedCommands(commands) {
      if (commands.length === 0) {
        return [];
      }

      const endpoints = commands.map((command) => commandEndpoints(command));
      const endpointKeys = endpoints.map(([start, stop]) => [pointKey(start), pointKey(stop)]);
      const nodeToEdges = new Map();

      for (let index = 0; index < endpointKeys.length; index += 1) {
        const [startKey, stopKey] = endpointKeys[index];
        if (!nodeToEdges.has(startKey)) nodeToEdges.set(startKey, []);
        nodeToEdges.get(startKey).push(index);
        if (stopKey !== startKey) {
          if (!nodeToEdges.has(stopKey)) nodeToEdges.set(stopKey, []);
          nodeToEdges.get(stopKey).push(index);
        }
      }

      const components = [];
      const visitedEdges = new Set();

      for (let startEdge = 0; startEdge < commands.length; startEdge += 1) {
        if (visitedEdges.has(startEdge)) {
          continue;
        }

        const component = [];
        const stack = [startEdge];
        visitedEdges.add(startEdge);

        while (stack.length > 0) {
          const edgeIndex = stack.pop();
          component.push(edgeIndex);
          const [startKey, stopKey] = endpointKeys[edgeIndex];
          for (const nodeKey of [startKey, stopKey]) {
            const neighbors = nodeToEdges.get(nodeKey) || [];
            for (const neighborEdge of neighbors) {
              if (visitedEdges.has(neighborEdge)) {
                continue;
              }
              visitedEdges.add(neighborEdge);
              stack.push(neighborEdge);
            }
          }
        }

        component.sort((a, b) => a - b);
        components.push(component);
      }

      components.sort((a, b) => a[0] - b[0]);

      const stitched = [];

      for (const component of components) {
        if (stitched.length > 0) {
          stitched.push({ kind: "break" });
        }

        const componentNodes = new Map();
        const degree = new Map();

        for (const edgeIndex of component) {
          const [startKey, stopKey] = endpointKeys[edgeIndex];
          if (!componentNodes.has(startKey)) componentNodes.set(startKey, []);
          if (!componentNodes.has(stopKey)) componentNodes.set(stopKey, []);
          componentNodes.get(startKey).push(edgeIndex);
          componentNodes.get(stopKey).push(edgeIndex);

          if (startKey === stopKey) {
            degree.set(startKey, (degree.get(startKey) || 0) + 2);
          } else {
            degree.set(startKey, (degree.get(startKey) || 0) + 1);
            degree.set(stopKey, (degree.get(stopKey) || 0) + 1);
          }
        }

        for (const edges of componentNodes.values()) {
          edges.sort((a, b) => b - a);
        }

        const preferredStart = endpointKeys[component[0]][0];
        let startNode = preferredStart;
        for (const [nodeKey, count] of degree.entries()) {
          if (count % 2 === 1) {
            startNode = nodeKey;
            break;
          }
        }

        const usedEdges = new Set();
        const orderedComponent = [];

        function walk(nodeKey) {
          const incidentEdges = componentNodes.get(nodeKey) || [];
          while (incidentEdges.length > 0) {
            const edgeIndex = incidentEdges.pop();
            if (usedEdges.has(edgeIndex)) {
              continue;
            }

            usedEdges.add(edgeIndex);
            const [edgeStart, edgeStop] = endpointKeys[edgeIndex];
            const nextNode = nodeKey === edgeStart ? edgeStop : edgeStart;
            walk(nextNode);

            let command = commands[edgeIndex];
            if (nodeKey !== edgeStart) {
              command = reverseCommand(command);
            }
            orderedComponent.push(command);
          }
        }

        walk(startNode);
        orderedComponent.reverse();
