        stitched.push(...orderedComponent);
      }

      return stitched;
    }

    function buildStitchedGuidedCommands(grid) {
      return stitchGuidedCommands(buildGuidedCommands(grid));
    }

    function buildGuidedPolylines(grid, revealAtMsLimit = Infinity) {
      const commands = buildStitchedGuidedCommands(grid);
      const polylines = [];
      let currentPolyline = [];

      for (const command of commands) {
        if (command.kind === "break") {
          if (currentPolyline.length >= 2) {
            polylines.push(currentPolyline);
          }
          currentPolyline = [];
          continue;
        }

        if ((command.revealAtMs ?? 0) > revealAtMsLimit) {
          if (currentPolyline.length >= 2) {
            polylines.push(currentPolyline);
          }
          currentPolyline = [];
          continue;
        }

        const points = sampleCommandPoints(command);
        if (points.length < 2) {
          continue;
        }

        appendPointsToPolyline(currentPolyline, points);
      }

      if (currentPolyline.length >= 2) {
        polylines.push(currentPolyline);
      }

      return {
        commands,
        polylines,
      };
    }

    function buildGuidedKolamExport(grid) {
      const { commands, polylines } = buildGuidedPolylines(grid, Infinity);
      if (polylines.length === 0 || commands.length === 0) {
        return null;
      }

      const allPoints = [];
      for (const dot of grid.pullis) {
        allPoints.push({ x: dot.x, y: dot.y });
      }

      const branchPolylines = polylines.map((points, index) => ({
        branchId: index + 1,
        points,
      }));

      for (const branch of branchPolylines) {
        allPoints.push(...branch.points);
      }

      if (allPoints.length === 0) {
        return null;
      }

      let minX = Infinity;
      let minY = Infinity;
      let maxX = -Infinity;
      let maxY = -Infinity;
      for (const point of allPoints) {
        minX = Math.min(minX, point.x);
        minY = Math.min(minY, point.y);
        maxX = Math.max(maxX, point.x);
        maxY = Math.max(maxY, point.y);
      }

      const padding = Math.max(12, grid.styleSpacing * 0.4);
      const width = maxX - minX + padding * 2;
      const height = maxY - minY + padding * 2;
      const shiftX = padding - minX;
      const shiftY = padding - minY;

      const dotRadius = Math.max(1.4, grid.styleSpacing * 0.05);
      const strokeWidth = Math.max(1.6, grid.styleSpacing * 0.085);
      const shiftedPullis = grid.pullis.map((dot) => ({
        x: dot.x + shiftX,
        y: dot.y + shiftY,
      }));
      const shiftedVisiblePullis = grid.pullis
        .filter((_, index) => visitedDots.has(index))
        .map((dot) => ({
          x: dot.x + shiftX,
          y: dot.y + shiftY,
        }));
      const shiftedCommands = commands.map((command) => {
        if (command.kind === "line" && command.line) {
          return {
            kind: "line",
            line: {
              x1: command.line.x1 + shiftX,
              y1: command.line.y1 + shiftY,
              x2: command.line.x2 + shiftX,
              y2: command.line.y2 + shiftY,
            },
          };
        }

        if (command.kind === "arc" && command.arc) {
          return {
            kind: "arc",
            arc: {
              cx: command.arc.cx + shiftX,
              cy: command.arc.cy + shiftY,
              radius: command.arc.radius,
              rotation: command.arc.rotation,
              start: command.arc.start,
              stop: command.arc.stop,
            },
          };
        }

        return { kind: "break" };
      });
      const shiftedBranches = branchPolylines.map((branch) => ({
        branchId: branch.branchId,
        points: branch.points.map((point) => ({
          x: point.x + shiftX,
          y: point.y + shiftY,
        })),
      }));

      const dotElements = shiftedVisiblePullis
        .map((dot) => (
          `<circle cx="${formatNum(dot.x)}" cy="${formatNum(dot.y)}" r="${formatNum(dotRadius)}" />`
        ))
        .join("\n    ");

      const strokeElements = shiftedBranches
        .filter((branch) => branch.points.length >= 2)
        .map((branch) => {
          const pointsAttr = branch.points
            .map((point) => `${formatNum(point.x)},${formatNum(point.y)}`)
            .join(" ");
          return `<polyline data-branch-id="${branch.branchId}" points="${pointsAttr}" />`;
        });

      const svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${PLOTTER_EXPORT_SIZE_IN}in" height="${PLOTTER_EXPORT_SIZE_IN}in" viewBox="0 0 ${formatNum(width)} ${formatNum(height)}">
  <g fill="#101010" fill-opacity="0.7">
    ${dotElements}
  </g>
  <g fill="none" stroke="#0b55ff" stroke-width="${formatNum(strokeWidth)}" stroke-linecap="round" stroke-linejoin="round">
    ${strokeElements.join("\n    ")}
  </g>
</svg>`;

      exportCount += 1;
      const now = new Date().toISOString().replace(/[:.]/g, "-");
      const filename = `guided-kolam-${now}-${String(exportCount).padStart(2, "0")}.svg`;
      return {
        svg,
        filename,
        guidedKolam: {
          width,
          height,
          widthIn: PLOTTER_EXPORT_SIZE_IN,
          heightIn: PLOTTER_EXPORT_SIZE_IN,
          pullis: shiftedPullis,
          visiblePullis: shiftedVisiblePullis,
          commands: shiftedCommands,
          branches: shiftedBranches,
          dotStyle: "circle",
          dotMarkPx: Math.max(3, grid.styleSpacing * 0.09),
          strokeWidthPx: strokeWidth,
        },
      };
    }

    async function drawKolamOnPlotter(grid) {
      if (isDrawingKolam) {
        return;
      }

      const payload = buildGuidedKolamExport(grid);
      if (!payload) {
        setStatus("No kolam exists yet. Pinch near a dot first.");
        return;
      }

      const requestId = nextPlotRequestId + 1;
      nextPlotRequestId = requestId;
      currentPlotRequestId = requestId;
      const clientRequestId = `guided-kolam-${Date.now()}-${requestId}`;
      currentPlotClientRequestId = clientRequestId;

      isDrawingKolam = true;
      lastUserActivityAtMs = performance.now();
      results = null;
      openPlotterLightbox("Sending Kolam...", "Preparing kolam for plotter...", payload.svg);
      setStatus("Sending kolam to plotter...");
      try {
        video.pause();
      } catch (error) {
        console.warn("Could not pause video feed.", error);
      }

      try {
        const response = await fetch(bridgeUrl("/plot-svg"), {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            ...payload,
            clientRequestId,
          }),
        });
        const data = await response.json().catch(() => ({}));
        if (requestId !== currentPlotRequestId) {
          return;
        }

        if (!response.ok) {
          const message = data?.message || `Plotter bridge error (${response.status})`;
          if (response.status === 409 || data?.status === "busy") {
            lightboxTitleEl.textContent = "All Plotters Busy";
            lightboxMessage = "All available plotters are currently busy. Try again in a moment.";
            lightboxMessageEl.textContent = lightboxMessage;
            lightboxPlotterFallbackCopy = "All plotters are busy right now!";
            setLightboxAssignedPlotter(null);
            settlePlotterLightbox(`${lightboxMessage} ${READY_STATUS}`);
            return;
          }

          lightboxTitleEl.textContent = "Plot Failed";
          lightboxMessage = message;
          lightboxMessageEl.textContent = lightboxMessage;
          lightboxPlotterFallbackCopy = "The plotter assignment could not be confirmed.";
          setLightboxAssignedPlotter(null);
          settlePlotterLightbox(`${message} ${READY_STATUS}`);
          return;
        }

        if (data.status === "done") {
          const assignedLabel = normalizePlotterLabel(data.assigned_plotter_label) || lightboxAssignedPlotterLabel;
          lightboxTitleEl.textContent = "You've drawn a kolam!";
          lightboxMessage = assignedLabel
            ? `Take a look at the plotters on your left. Plotter ${assignedLabel} is drawing it now.`
            : "Take a look at the plotters on your left. Your kolam is drawing now.";
          lightboxMessageEl.textContent = lightboxMessage;
          setLightboxAssignedPlotter(assignedLabel);
          settlePlotterLightbox(`Ready for a new kolam. ${READY_STATUS}`);
        } else if (data.status === "plotter_unavailable") {
          lightboxTitleEl.textContent = "Plotter Unavailable";
          lightboxMessage = data.message || "AxiDraw was detected but could not be opened.";
          lightboxMessageEl.textContent = lightboxMessage;
          lightboxPlotterFallbackCopy = "A plotter was detected, but it could not be opened.";
          setLightboxAssignedPlotter(null);
          settlePlotterLightbox(`${lightboxMessage} ${READY_STATUS}`);
        } else if (data.status === "no_plotter") {
          lightboxTitleEl.textContent = "No Plotter Connected";
          lightboxMessage = "No plotter connected.";
          lightboxMessageEl.textContent = lightboxMessage;
          lightboxPlotterFallbackCopy = "No plotter is connected right now.";
          setLightboxAssignedPlotter(null);
          settlePlotterLightbox(`No plotter connected. Grid cleared. ${READY_STATUS}`);
        } else if (data.status === "no_active_plotter") {
          lightboxTitleEl.textContent = "Active Plotters Unavailable";
          lightboxMessage = data.message || "Only the passive plotter is available right now.";
          lightboxMessageEl.textContent = lightboxMessage;
          lightboxPlotterFallbackCopy = "Plotters A and B are unavailable right now.";
          setLightboxAssignedPlotter(null);
          settlePlotterLightbox(`${lightboxMessage} ${READY_STATUS}`);
        } else if (data.status === "multiple_plotters") {
          lightboxTitleEl.textContent = "Too Many Plotters";
          lightboxMessage = "Multiple plotters connected.";
          lightboxMessageEl.textContent = lightboxMessage;
          lightboxPlotterFallbackCopy = "Too many plotters are connected for this client flow.";
          setLightboxAssignedPlotter(null);
          settlePlotterLightbox(data.message || "Too many plotters connected.");
        } else if (data.status === "busy") {
          lightboxTitleEl.textContent = "All Plotters Busy";
          lightboxMessage = "All available plotters are currently busy. Try again in a moment.";
          lightboxMessageEl.textContent = lightboxMessage;
          lightboxPlotterFallbackCopy = "All plotters are busy right now!";
          setLightboxAssignedPlotter(null);
          settlePlotterLightbox(`${lightboxMessage} ${READY_STATUS}`);
        } else {
          lightboxTitleEl.textContent = "Plotter Response";
          lightboxMessage = data.message || "Plotter response received.";
          lightboxMessageEl.textContent = lightboxMessage;
          lightboxPlotterFallbackCopy = "The plotter assignment could not be confirmed.";
          setLightboxAssignedPlotter(null);
          settlePlotterLightbox(data.message || "Plotter response received.");
        }
      } catch (error) {
        if (requestId !== currentPlotRequestId) {
          return;
        }
        console.error(error);
        lightboxTitleEl.textContent = "You've drawn a kolam!";
        lightboxMessage = `Take a look at the plotters on your left. ${error?.message || "Plotter bridge is offline. Start python3 plotter-bridge/app.py"}`;
        lightboxMessageEl.textContent = lightboxMessage;
        lightboxPlotterFallbackCopy = "The plotter bridge is offline right now.";
        setLightboxAssignedPlotter(null);
        settlePlotterLightbox(lightboxMessage);
      } finally {
        if (requestId === currentPlotRequestId) {
          fistLatched = false;
          fistStartedAtMs = 0;
        }
      }
    }

    function sampleArcPoints(arc, minSegments = 16) {
      const span = Math.abs(arc.stop - arc.start);
      const segments = Math.max(minSegments, Math.ceil(span / (Math.PI / 18)));
      const points = [];

      for (let i = 0; i <= segments; i += 1) {
        const theta = arc.start + (arc.stop - arc.start) * (i / segments);
        const localX = arc.radius * Math.cos(theta);
        const localY = arc.radius * Math.sin(theta);

        const rotatedX = Math.cos(arc.rotation) * localX - Math.sin(arc.rotation) * localY;
        const rotatedY = Math.sin(arc.rotation) * localX + Math.cos(arc.rotation) * localY;

        points.push({
          x: arc.cx + rotatedX,
          y: arc.cy + rotatedY,
        });
      }

      return points;
    }

    function drawGuidedKolam(grid) {
      const nowMs = performance.now();
      const { commands, polylines } = buildGuidedPolylines(grid, nowMs);
      const fullRevealAtMs = commands.reduce(
        (latest, command) => Math.max(latest, command.revealAtMs ?? 0),
        0
      );
      const skeletonFadeProgress =
        commands.length > 0 && nowMs >= fullRevealAtMs
          ? Math.min(1, (nowMs - fullRevealAtMs) / KOLAM_SKELETON_FADE_MS)
          : 0;
      const skeletonAlpha = 0.94 * (1 - skeletonFadeProgress);

      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = `rgba(255, 221, 125, ${skeletonAlpha.toFixed(3)})`;
      ctx.lineWidth = Math.max(2.2, grid.styleSpacing * 0.06);

      if (skeletonAlpha > 0.01) {
        for (const edge of framework) {
          if (edge.reverse) continue;
          const dot1 = grid.pullis[edge.x];
          const dot2 = grid.pullis[edge.y];
          if (!dot1 || !dot2) continue;

          ctx.beginPath();
          ctx.moveTo(dot1.x, dot1.y);
          ctx.lineTo(dot2.x, dot2.y);
          ctx.stroke();
        }
      }

      ctx.strokeStyle = "rgba(255, 221, 125, 0.95)";
      ctx.lineWidth = Math.max(2, grid.styleSpacing * 0.09);

      for (const points of polylines) {
        if (points.length < 2) {
          continue;
        }

        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i += 1) {
          ctx.lineTo(points[i].x, points[i].y);
        }
        ctx.stroke();
      }

      if (activeDotIndex !== null && grid.pullis[activeDotIndex]) {
        const active = grid.pullis[activeDotIndex];
        ctx.fillStyle = "#ffff00";
        ctx.beginPath();
        ctx.arc(active.x, active.y, Math.max(3.5, grid.styleSpacing * 0.07), 0, Math.PI * 2);
        ctx.fill();
      }

      if (pinchPoint) {
        ctx.fillStyle = "rgba(255, 221, 125, 1)";
        ctx.beginPath();
        ctx.arc(pinchPoint.x, pinchPoint.y, 5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawDrawingOverlay() {
      ctx.save();
      ctx.fillStyle = "rgba(0, 0, 0, 0.45)";
      ctx.fillRect(0, 0, cssWidth, cssHeight);

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = `700 ${Math.max(24, Math.round(Math.min(cssWidth, cssHeight) * 0.08))}px monospace`;
      ctx.fillStyle = "#ffe27d";
      ctx.fillText("Drawing Kolam!", cssWidth / 2, cssHeight / 2);
      ctx.restore();
    }

    function drawPassiveOverlay() {
      ctx.save();
      ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
      ctx.fillRect(0, 0, cssWidth, cssHeight);

      const title =
        passiveModeState === "starting"
          ? "Starting Passive Mode..."
          : passiveModeState === "stopping"
            ? "Returning to Active Mode..."
            : "Passive Mode";
      const message =
        passiveModeState === "starting"
          ? "Autonomous kolams are being handed to the plotters."
          : passiveModeState === "stopping"
            ? "Stopping autonomous kolams. One moment..."
            : "Autonomous kolams are drawing. Show a hand or press any key to return.";

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#ffe27d";
      ctx.font = `700 ${Math.max(26, Math.round(Math.min(cssWidth, cssHeight) * 0.072))}px "PP Mori", sans-serif`;
      ctx.fillText(title, cssWidth / 2, cssHeight / 2 - 18);

      ctx.fillStyle = "rgba(255, 255, 255, 0.92)";
      ctx.font = `500 ${Math.max(14, Math.round(Math.min(cssWidth, cssHeight) * 0.024))}px "PP Mori", sans-serif`;
      ctx.fillText(message, cssWidth / 2, cssHeight / 2 + 24);
      ctx.restore();
    }

    async function setupCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" },
        audio: false,
      });
      video.srcObject = stream;
      await video.play();
    }

    async function createLandmarker() {
      const vision = await import(VISION_BUNDLE_URL);
      const fileset = await vision.FilesetResolver.forVisionTasks(WASM_ROOT);

      try {
        handLandmarker = await vision.HandLandmarker.createFromOptions(fileset, {
          baseOptions: {
            modelAssetPath: HAND_MODEL_URL,
            delegate: "GPU",
          },
          runningMode: "VIDEO",
          numHands: 1,
        });
      } catch (error) {
        console.warn("GPU init failed. Falling back to CPU.", error);
        handLandmarker = await vision.HandLandmarker.createFromOptions(fileset, {
          baseOptions: {
            modelAssetPath: HAND_MODEL_URL,
            delegate: "CPU",
          },
          runningMode: "VIDEO",
          numHands: 1,
        });
      }
    }

    function drawHands(hands, drawRect) {
      for (const hand of hands) {
        if (!hand) continue;

        ctx.strokeStyle = "#fff7ef";
        ctx.lineWidth = 3.5;
        for (const [a, b] of HAND_CONNECTIONS) {
          const pa = hand[a];
          const pb = hand[b];
          if (!pa || !pb) continue;
          const ax = drawRect.drawX + (1 - pa.x) * drawRect.drawWidth;
          const ay = drawRect.drawY + pa.y * drawRect.drawHeight;
          const bx = drawRect.drawX + (1 - pb.x) * drawRect.drawWidth;
          const by = drawRect.drawY + pb.y * drawRect.drawHeight;
          ctx.beginPath();
          ctx.moveTo(ax, ay);
          ctx.lineTo(bx, by);
          ctx.stroke();
        }

        ctx.fillStyle = "#2a1209";
        for (const point of hand) {
          const x = drawRect.drawX + (1 - point.x) * drawRect.drawWidth;
          const y = drawRect.drawY + point.y * drawRect.drawHeight;
          ctx.beginPath();
          ctx.arc(x, y, 4, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function drawFrame() {
      if (!video.videoWidth || !video.videoHeight) {
        return;
      }
      updateLightboxCountdown();
      maybeStartPassiveMode();

      const drawRect = getDrawRect();
      const grid = getGridData(drawRect.drawX, drawRect.drawY, drawRect.drawWidth, drawRect.drawHeight);

      ctx.clearRect(0, 0, cssWidth, cssHeight);
      ctx.fillStyle = PAGE_BG;
      ctx.fillRect(0, 0, cssWidth, cssHeight);

      drawKolamGrid(grid);

      const allHands = results?.landmarks || [];
      if (allHands.length > 0) {
        noteUserActivity("hand");
      }

      const interactiveHands = isDrawingKolam || passiveModeState !== "active" ? [] : allHands;
      updateGuidedKolamFromHands(interactiveHands, drawRect, grid);
      drawGuidedKolam(grid);
      if (passiveModeState !== "active" && !lightboxVisible) {
        drawPassiveOverlay();
      } else if (isDrawingKolam && !lightboxVisible) {
        drawDrawingOverlay();
      }

      if (!lightboxVisible && allHands.length > 0) {
        drawHands(allHands, drawRect);
      }
    }

    function loop() {
      if (handLandmarker && video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;
        results = handLandmarker.detectForVideo(getHandposeFrameSource(), performance.now());
      }

      drawFrame();
      updateGamepadControls();
      requestAnimationFrame(loop);
    }

    async function init() {
      try {
        resizeCanvas();
        setStatus("Starting camera...");
        await setupCamera();
        setStatus("Loading hand model...");
        await createLandmarker();
        await refreshAvailablePlotters(true);
        clearGuidedKolam(true, null);
        lastUserActivityAtMs = performance.now();
        setStatus(READY_STATUS);
        void connectArduinoOnStartup();
        window.setInterval(() => {
          void refreshAvailablePlotters(true);
        }, PLOTTER_STATE_REFRESH_INTERVAL_MS);
        loop();
      } catch (error) {
        console.error(error);
        setStatus("Failed: camera/model setup error");
      }
    }

    window.addEventListener("resize", resizeCanvas);
    if (typeof ResizeObserver !== "undefined") {
      const stageResizeObserver = new ResizeObserver(() => {
        resizeCanvas();
      });
      stageResizeObserver.observe(stageViewportEl);
    }
    for (const eventName of ["pointerdown", "pointermove", "touchstart"]) {
      window.addEventListener(eventName, () => {
        noteUserActivity(eventName);
      }, { passive: true });
    }
    window.addEventListener("gamepadconnected", (event) => {
      activeGamepadIndex = event.gamepad.index;
      gamepadPressedStateByIndex.delete(event.gamepad.index);
      setStatus(gamepadConnectedStatus());
      void refreshAvailablePlotters(true).then(() => {
        setStatus(gamepadConnectedStatus());
      });
    });
    window.addEventListener("gamepaddisconnected", (event) => {
      gamepadPressedStateByIndex.delete(event.gamepad.index);
      if (activeGamepadIndex === event.gamepad.index) {
        activeGamepadIndex = null;
      }
      setStatus("Controller disconnected.");
    });
    window.addEventListener("keydown", async (event) => {
      if (event.repeat) {
        return;
      }

      const upperKey = event.key.length === 1 ? event.key.toUpperCase() : event.key;
      if (lightboxVisible && availablePlotterLabels.includes(upperKey)) {
        setLightboxAssignedPlotter(upperKey);
        return;
      }

      const isEraseTraceArmKey = event.key === "e" || event.key === "E";
      const isEraseTraceRunKey = event.key === "p" || event.key === "P";
      const shouldCarryKeyThroughPassiveExit = isEraseTraceArmKey || (isEraseTraceRunKey && eraseTraceModeArmed);

      if (shouldCarryKeyThroughPassiveExit) {
        if (!(await ensureActiveModeForManualAction("keyboard"))) {
          return;
        }
      } else {
        noteUserActivity("keyboard");
        if (passiveModeState !== "active") {
          return;
        }
      }

      if (event.key === "c" || event.key === "C") {
        eraseTraceModeArmed = false;
        clearGuidedKolam();
        return;
      }

      if (event.key === "d" || event.key === "D") {
        eraseTraceModeArmed = false;
        void sendBridgeControl("/pen-down", "Pen down");
        return;
      }

      if (event.key === "u" || event.key === "U") {
        eraseTraceModeArmed = false;
        void sendBridgeControl("/pen-up", "Pen up");
        return;
      }

      if (event.key === "e" || event.key === "E") {
        eraseTraceModeArmed = !eraseTraceModeArmed;
        setStatus(eraseTraceModeArmed ? ERASE_TRACE_ARMED_STATUS : "Erase sweep mode canceled.");
        return;
      }

      if (event.key === "p" || event.key === "P") {
        if (!eraseTraceModeArmed) {
          return;
        }
        eraseTraceModeArmed = false;
        void sendBridgeControl("/erase-area", "Erase sweep");
        return;
      }

      if (event.key === "x" || event.key === "X") {
        eraseTraceModeArmed = false;
        void sendBridgeControl("/disable-motors", "Return home + disable motors");
        return;
      }

      if (event.key === "r" || event.key === "R") {
        eraseTraceModeArmed = false;
        void sendBridgeControl("/arduino/servo-toggle", "Servo toggle");
      }
    });

    init();
  </script>
</body>

</html>
